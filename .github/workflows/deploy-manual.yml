name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      sha:
        description: "Commit SHA to deploy (defaults to current ref SHA)"
        required: false
        type: string

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: inputs.environment == 'staging'
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: staging
      target_sha: ${{ inputs.sha || github.sha }}
      host: ${{ vars.STAGING_HOST || '136.114.103.71' }}
      user: ${{ vars.STAGING_USER || 'ssperrottet' }}
      script_path: deploy/deploy-staging.sh

  deploy-prod:
    if: inputs.environment == 'prod'
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: production
      target_sha: ${{ inputs.sha || github.sha }}
      host: ${{ vars.PROD_HOST }}
      user: ${{ vars.PROD_USER }}
      script_path: deploy/deploy-prod.sh
      verify_public_host: true
      auto_confirm: true
