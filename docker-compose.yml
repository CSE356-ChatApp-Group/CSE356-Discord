# =============================================================================
# ChatApp MVP – docker-compose.yml
#
# Local development: runs all services on one machine.
# Cloud deployment: split across 4 nodes (see docs/deployment.md).
#
# Services map to cloud nodes:
#   Node 1 (db):        postgres, redis
#   Node 2 (proxy):     nginx, api (primary)
#   Node 3 (api):       api (replica)
#   Node 4 (monitor):   api (replica), prometheus, grafana
# =============================================================================

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  chatapp:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  pg_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  alertmanager_data:
  # Isolated from macOS host node_modules; if Vite returns HTTP 500, remove this volume and recreate:
  #   docker compose down && docker volume rm "$(docker volume ls -q | grep frontend_node_modules)"
  #   docker compose up -d
  frontend_node_modules:
  # Shared by api + migrate; same pattern as frontend_node_modules.
  # If the API returns 400/500 on POST with errors like "Cannot find module '../encodings'" (iconv-lite)
  # or `tsx`/iconv-lite fails (ERR_MODULE_NOT_FOUND esbuild / '../encodings'), clear and reinstall:
  #   docker compose down && docker volume rm <project>_backend_node_modules && docker compose up -d
  #   docker compose exec -u root api sh -c 'cd /app && rm -rf node_modules/* && npm ci' && docker compose restart api
  backend_node_modules:
  meili_data:

services:
  # ── Node 1 · Database ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatapp_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [chatapp]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev}
      --appendonly yes
    volumes:
      - redis_data:/data
    networks: [chatapp]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 10s

  # ── Node 2 · API (primary) ────────────────────────────────────────────────────
  api:
    image: node:20-alpine
    working_dir: /app
    # See backend/scripts/docker-api-boot.sh — partial node_modules volumes need full wipe + npm ci.
    command: ["sh", "scripts/docker-api-boot.sh"]
    volumes:
      - ./backend:/app
      - ./migrations:/migrations
      - backend_node_modules:/app/node_modules
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      AUTH_BYPASS: ${AUTH_BYPASS:-false}
      PORT: 3000
      DATABASE_URL: postgres://chatapp:${POSTGRES_PASSWORD:-chatapp_dev}@postgres:5432/chatapp
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev}@${REDIS_HOST:-redis}:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # High defaults for local E2E churn (many parallel workers hit register/login).
      AUTH_REGISTER_RATE_LIMIT_MAX: ${AUTH_REGISTER_RATE_LIMIT_MAX:-500}
      AUTH_LOGIN_RATE_LIMIT_MAX: ${AUTH_LOGIN_RATE_LIMIT_MAX:-500}
      # COMPAS / throughput: duplicate channel message:created to user:<id> (app default on; explicit for clarity).
      CHANNEL_MESSAGE_USER_FANOUT: ${CHANNEL_MESSAGE_USER_FANOUT:-true}
      CHANNEL_MESSAGE_USER_FANOUT_MAX: ${CHANNEL_MESSAGE_USER_FANOUT_MAX:-10000}
      WS_BOOTSTRAP_BATCH_SIZE: ${WS_BOOTSTRAP_BATCH_SIZE:-120}
      # S3 / MinIO
      # PUBLIC endpoint is what clients (and tests) use — routed via nginx.
      # INTERNAL endpoint is what the API signs with inside Docker.
      # If you point S3_ENDPOINT at a host-mapped MinIO port (e.g. :19009), use that same origin for
      # presigned PUTs and keep S3_ACCESS_KEY / S3_SECRET_KEY identical to that MinIO’s root creds.
      S3_ENDPOINT: http://localhost/minio
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-chatapp-attachments}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # OAuth (optional – configure in .env)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # Meilisearch (only active when COMPOSE_PROFILES=meili; defaults keep MEILI_ENABLED=false)
      MEILI_ENABLED: ${MEILI_ENABLED:-false}
      SEARCH_BACKEND: ${SEARCH_BACKEND:-postgres}
      MEILI_HOST: ${MEILI_HOST:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_dev_key}
      MEILI_INDEX_MESSAGES: ${MEILI_INDEX_MESSAGES:-messages}
      MEILI_CANDIDATE_LIMIT: ${MEILI_CANDIDATE_LIMIT:-200}
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 180s
    networks: [chatapp]
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3000"
      - "prometheus.path=/metrics"

  # Run migrations as a one-shot container before the API starts
  migrate:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci || (rm -rf node_modules && npm ci) && npm run migrate"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://chatapp:${POSTGRES_PASSWORD:-chatapp_dev}@postgres:5432/chatapp
      MIGRATIONS_DIR: /migrations
    depends_on:
      postgres: { condition: service_healthy }
    networks: [chatapp]
    restart: "no"

  # ── Node 2 · Reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      # Staging-parity SPA: run `npm run build` in ./frontend before/up; same origin as /api and /ws.
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api: { condition: service_healthy }
    networks: [chatapp]

  # ── S3-compatible object storage (MinIO) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3 API (presigned uploads from host-run API / curl)
      - "9001:9001" # Web console (dev only)
    networks: [chatapp]

  # Create the S3 bucket on first boot
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/${S3_BUCKET:-chatapp-attachments};
        mc anonymous set download local/${S3_BUCKET:-chatapp-attachments};
        exit 0"
    networks: [chatapp]
    restart: "no"

  # ── Frontend dev server (local only – in production, build and serve via Nginx)
  frontend:
    image: node:20-alpine
    working_dir: /app
    # Monorepo lockfile lives at repo root; this service only mounts ./frontend — use npm install, not npm ci.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "/api/v1"
      VITE_WS_BASE: "/ws"
      API_PROXY_TARGET: "http://nginx"
      WS_PROXY_TARGET: "ws://nginx"
    networks: [chatapp]
    # Nginx starts only after api is healthy; wait for nginx so /api proxy is not 502 during npm install.
    depends_on:
      nginx: { condition: service_started }
      api: { condition: service_healthy }

  # ── Meilisearch (local dev / optional CI integration tests) ─────────────────
  # Mirrors the dedicated meilisearch-vm (10.0.0.146) in production.
  # Not required for normal CI — gated by COMPOSE_PROFILES=meili or explicit
  #   docker compose --profile meili up
  meilisearch:
    image: getmeili/meilisearch:v1.8
    profiles: [meili]
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meili_dev_key}
      MEILI_ENV: development
    volumes:
      - meili_data:/meili_data
    networks: [chatapp]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7700/health | grep -q available"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node 4 · Monitoring ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    restart: unless-stopped
    depends_on: [alertmanager]
    environment:
      ALERT_ENVIRONMENT: ${ALERT_ENVIRONMENT:-local}
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    entrypoint:
      - sh
      - -ec
    command:
      - |
        sed "s/__ALERT_ENVIRONMENT__/$${ALERT_ENVIRONMENT:-local}/g" /etc/prometheus/prometheus.yml.template >/tmp/prometheus.yml
        exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - ./infrastructure/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks: [chatapp]

  alertmanager:
    image: prom/alertmanager:v0.28.0
    restart: unless-stopped
    environment:
      ALERT_ENVIRONMENT: ${ALERT_ENVIRONMENT:-local}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_WEBHOOK_URL_LOCAL: ${DISCORD_WEBHOOK_URL_LOCAL:-}
      DISCORD_WEBHOOK_URL_STAGING: ${DISCORD_WEBHOOK_URL_STAGING:-}
      DISCORD_WEBHOOK_URL_PROD: ${DISCORD_WEBHOOK_URL_PROD:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    entrypoint:
      - sh
      - -ec
    command:
      - |
        mkdir -p /alertmanager/secrets
        WEBHOOK="$$DISCORD_WEBHOOK_URL"
        case "$${ALERT_ENVIRONMENT:-local}" in
          prod|production)
            [ -n "$$DISCORD_WEBHOOK_URL_PROD" ] && WEBHOOK="$$DISCORD_WEBHOOK_URL_PROD"
            ;;
          stage|staging)
            [ -n "$$DISCORD_WEBHOOK_URL_STAGING" ] && WEBHOOK="$$DISCORD_WEBHOOK_URL_STAGING"
            ;;
          local|dev|development)
            [ -n "$$DISCORD_WEBHOOK_URL_LOCAL" ] && WEBHOOK="$$DISCORD_WEBHOOK_URL_LOCAL"
            ;;
        esac
        printf '%s\n' "$$WEBHOOK" >/alertmanager/secrets/discord_webhook_url
        exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - ./infrastructure/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks: [chatapp]

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks: [chatapp]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"database\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [chatapp]

  tempo:
    image: grafana/tempo:2.5.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./infrastructure/monitoring/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3200/metrics >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [chatapp]

  loki:
    image: grafana/loki:3.1.0
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [chatapp]

  promtail:
    image: grafana/promtail:3.1.0
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infrastructure/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    networks: [chatapp]
