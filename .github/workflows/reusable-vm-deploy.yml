name: Reusable VM Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment name
        required: true
        type: string
      target_sha:
        description: Commit SHA to deploy
        required: true
        type: string
      host:
        description: Remote host
        required: true
        type: string
      user:
        description: Remote SSH user
        required: true
        type: string
      script_path:
        description: Deploy script to execute
        required: true
        type: string
      verify_public_host:
        description: Verify public HTTP endpoints after deploy
        required: false
        default: false
        type: boolean
      auto_confirm:
        description: Pipe yes into interactive deploy scripts
        required: false
        default: false
        type: boolean
    secrets:
      DEPLOY_SSH_KEY:
        required: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure GitHub CLI exists
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Wait for release artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          TAG="release-$TARGET_SHA"
          MAX_ATTEMPTS=40
          SLEEP_SECONDS=15

          echo "Waiting for release artifact: $TAG"
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
              echo "Release artifact is ready."
              exit 0
            fi
            echo "Attempt $attempt/$MAX_ATTEMPTS: release not ready yet; sleeping ${SLEEP_SECONDS}s"
            sleep "$SLEEP_SECONDS"
          done

          echo "ERROR: release artifact $TAG not available after waiting."
          exit 1

      - name: Validate deploy inputs
        shell: bash
        run: |
          test -n "${{ inputs.host }}" || { echo "Missing deployment host"; exit 1; }
          test -n "${{ inputs.user }}" || { echo "Missing deployment user"; exit 1; }

      - name: Setup SSH key
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY" || { echo "Missing DEPLOY_SSH_KEY secret"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add host to known_hosts
        shell: bash
        run: |
          ssh-keyscan -H "${{ inputs.host }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.target_sha }}
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_USER: ${{ inputs.user }}
        run: |
          set -euo pipefail
          if [[ "${{ inputs.auto_confirm }}" == "true" ]]; then
            printf 'y\n' | STAGING_HOST="$DEPLOY_HOST" STAGING_USER="$DEPLOY_USER" PROD_HOST="$DEPLOY_HOST" PROD_USER="$DEPLOY_USER" GITHUB_REPO="${{ github.repository }}" \
              "./${{ inputs.script_path }}" "$TARGET_SHA"
          else
            STAGING_HOST="$DEPLOY_HOST" STAGING_USER="$DEPLOY_USER" PROD_HOST="$DEPLOY_HOST" PROD_USER="$DEPLOY_USER" GITHUB_REPO="${{ github.repository }}" \
              "./${{ inputs.script_path }}" "$TARGET_SHA"
          fi

      - name: Verify public endpoints
        if: ${{ inputs.verify_public_host }}
        shell: bash
        run: |
          curl -fsS --max-time 10 "http://${{ inputs.host }}/health" >/dev/null
          curl -fsS --max-time 10 "http://${{ inputs.host }}/" >/dev/null
          echo "Public endpoint checks passed for ${{ inputs.host }}"