name: Staging E2E

on:
  workflow_dispatch:
  schedule:
    # 03:00 UTC every night — staging is idle, no load tests running
    - cron: '0 3 * * *'

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: staging-e2e-nightly
  cancel-in-progress: false

jobs:
  e2e-staging-nightly:
    runs-on: [self-hosted, Linux, X64, gcp]
    timeout-minutes: 45
    env:
      E2E_BASE_URL: ${{ vars.STAGING_E2E_BASE_URL || format('http://{0}', vars.STAGING_HOST || '136.114.103.71') }}
      E2E_GLOBAL_TIMEOUT_MS: '2100000'
      CI: "true"
      API_CONTRACT_BASE_URL: ${{ format('http://{0}/api/v1', vars.STAGING_HOST || '136.114.103.71') }}
      API_CONTRACT_WS_URL: ${{ format('ws://{0}/ws', vars.STAGING_HOST || '136.114.103.71') }}
      API_CONTRACT_SSO_SKIP: ${{ vars.API_CONTRACT_SSO_SKIP }}

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run staging E2E against deployed staging
        run: npm run e2e:staging:ci

      - name: API contract harness
        run: npm run api-contract

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-staging-nightly-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7
