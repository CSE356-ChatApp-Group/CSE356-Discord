# =============================================================================
# Prometheus scrape configuration for ChatApp
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: chatapp-__ALERT_ENVIRONMENT__
    environment: __ALERT_ENVIRONMENT__

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # ── Node.js API instances ──────────────────────────────────────────────────
  - job_name: 'chatapp-api'
    static_configs:
      - targets:
          - 'api:3000'
          # Cloud Node 3 and 4 API replicas:
          # - '10.0.1.3:3000'
          # - '10.0.1.4:3000'
    metrics_path: '/metrics'

  # ── MinIO attachment store health ─────────────────────────────────────────
  - job_name: 'minio'
    metrics_path: '/minio/health/live'
    static_configs:
      - targets: ['minio:9000']

  # ── Host resource metrics ──────────────────────────────────────────────────
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # ── Postgres exporter ──────────────────────────────────────────────────────
  # Uncomment after adding postgres-exporter to docker-compose.yml
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # ── Redis exporter ─────────────────────────────────────────────────────────
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # ── Nginx stub_status ──────────────────────────────────────────────────────
  # - job_name: 'nginx'
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']
