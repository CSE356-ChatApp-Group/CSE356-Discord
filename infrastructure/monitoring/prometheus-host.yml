global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: chatapp-__ALERT_ENVIRONMENT__
    environment: __ALERT_ENVIRONMENT__

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'chatapp-api'
    metrics_path: '/metrics'
    static_configs:
      # Staging: both instances always run. Prod: deploy-prod.sh may append 4002/4003 when CHATAPP_INSTANCES>=4.
      - targets: ['127.0.0.1:4000']
        labels:
          node: live-4000
      - targets: ['127.0.0.1:4001']
        labels:
          node: candidate-4001

  - job_name: 'minio'
    metrics_path: '/minio/health/live'
    static_configs:
      - targets: ['127.0.0.1:9000']

  # App VM host metrics (node_exporter in remote-compose).
  - job_name: 'node'
    static_configs:
      - targets: ['127.0.0.1:9100']

  # Dedicated DB VM — targets from file_sd (see deploy/prometheus-db-file-sd.py).
  # Empty [] when Postgres is local or PGDUMP_DATABASE_URL is unset. Install exporters:
  #   DB_SSH=root@<db-host> ./deploy/install-db-metrics-exporters.sh
  - job_name: 'db-node'
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/db-node.json
        refresh_interval: 30s

  - job_name: 'db-postgres'
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/db-postgres.json
        refresh_interval: 30s

  # Host-network redis_exporter (deploy-staging ensures container). Metrics:
  # redis_memory_used_bytes, redis_connected_clients, redis_commands_processed_total, ...
  - job_name: 'redis'
    static_configs:
      - targets: ['127.0.0.1:9121']
        labels:
          instance: 'redis-local'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']
