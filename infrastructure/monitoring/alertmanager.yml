global:
  resolve_timeout: 5m

route:
  receiver: discord-default
  group_by: [environment, alertname, job, severity]
  group_wait: 15s
  group_interval: 5m
  repeat_interval: 12h
  routes:
    - receiver: "null"
      matchers:
        - alertname="Watchdog"
    - receiver: discord-critical
      matchers:
        - severity="critical"

receivers:
  - name: "null"

  - name: discord-default
    discord_configs:
      - webhook_url_file: /alertmanager/secrets/discord_webhook_url
        send_resolved: true
        username: ChatApp Alerts
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ with .CommonLabels.environment }}{{ . | toUpper }}{{ else }}UNKNOWN{{ end }}] {{ .CommonLabels.alertname }}'
        message: |
          **Environment:** {{ with .CommonLabels.environment }}{{ . }}{{ else }}unknown{{ end }}
          **Status:** {{ .Status | toUpper }}
          **Severity:** {{ with .CommonLabels.severity }}{{ . }}{{ else }}unknown{{ end }}
          **Job:** {{ with .CommonLabels.job }}{{ . }}{{ else }}(none — check alert labels){{ end }}
          {{ range .Alerts }}
          • {{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}{{ .Annotations.summary }}{{ end }}
          {{ end }}

  - name: discord-critical
    discord_configs:
      - webhook_url_file: /alertmanager/secrets/discord_webhook_url
        send_resolved: true
        username: ChatApp Alerts
        content: '@here'
        title: '{{ if eq .Status "firing" }}🚨 CRITICAL{{ else }}✅ RESOLVED{{ end }} · [{{ with .CommonLabels.environment }}{{ . | toUpper }}{{ else }}UNKNOWN{{ end }}] {{ .CommonLabels.alertname }}'
        message: |
          **Environment:** {{ with .CommonLabels.environment }}{{ . }}{{ else }}unknown{{ end }}
          **Status:** {{ .Status | toUpper }}
          **Severity:** {{ with .CommonLabels.severity }}{{ . }}{{ else }}critical{{ end }}
          **Job:** {{ with .CommonLabels.job }}{{ . }}{{ else }}(none — check alert labels){{ end }}
          {{ range .Alerts }}
          • {{ if .Annotations.description }}{{ .Annotations.description }}{{ else }}{{ .Annotations.summary }}{{ end }}
          {{ end }}

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity=~"warning|info"
    equal: ['alertname', 'job', 'instance']

  # Fast-burn API outage supersedes slower confirmation alert.
  - source_matchers:
      - alertname="ChatAppApiDownFast"
    target_matchers:
      - alertname="ChatAppApiDown"
    equal: ['job']

  # Severe route latency supersedes warning p95 for same route.
  - source_matchers:
      - alertname="ChatAppSevereP95Latency"
    target_matchers:
      - alertname="ChatAppHighP95Latency"
    equal: ['job', 'route']

  # Redis higher-threshold criticals supersede lower-threshold pages.
  - source_matchers:
      - alertname="ChatAppRedisMemoryHigh95"
    target_matchers:
      - alertname=~"ChatAppRedisMemoryHigh90|ChatAppRedisMemoryHigh80"
    equal: ['job', 'instance']

  - source_matchers:
      - alertname="ChatAppRedisMemoryHigh90"
    target_matchers:
      - alertname="ChatAppRedisMemoryHigh80"
    equal: ['job', 'instance']
