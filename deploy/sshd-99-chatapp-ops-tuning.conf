# Installed as /etc/ssh/sshd_config.d/99-chatapp-ops-tuning.conf on app VMs.
# Relieves "kex_exchange_identification: Connection reset" when many parallel SSH
# sessions open (CI, log tail scripts, Cursor agents) — raises global and per-source
# unauthenticated connection limits.
#
# After changing: sudo sshd -t && sudo systemctl reload ssh
MaxStartups 50:30:200
PerSourceMaxStartups 40
