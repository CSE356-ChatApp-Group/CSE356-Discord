# Fail2ban filter for ChatApp nginx access.log (chatapp_timed / patch-nginx-access-log-timing).
#
# Matches nginx-generated 503s where upstream time is absent (urt=-). Do NOT match on
# urt=- alone: normal lines (e.g. 200) also end with urt=- when no upstream timing applies.
#
# Log shape (example):
#   138.197.113.17 - - [23/Apr/2026:18:43:08 +0000] "GET / HTTP/1.1" 200 1693 "-" "curl/8.5.0" rt=0.000 urt=-
#
# Common mistake: requiring a literal space between `]` and the opening `"` of the
# request. Nginx combined + extras often emits `]"GET` with no space — use `\]\s*"` so
# zero or more whitespace is accepted.

[Definition]

failregex = ^<HOST> - \S+ \[[^\]]+\]\s*"\S+ [^"]+" 503 \d+ "[^"]*" "[^"]*" rt=[0-9.]+ urt=-\s*$

ignoreregex =
