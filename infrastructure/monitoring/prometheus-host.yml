global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: chatapp-__ALERT_ENVIRONMENT__
    environment: __ALERT_ENVIRONMENT__

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'chatapp-api'
    metrics_path: '/metrics'
    static_configs:
      # Staging: both instances always run. deploy-staging.sh does not modify this.
      # Prod: deploy-prod.sh copies this template and restarts Prometheus; it does not
      # rewrite ports (dual-upstream prod must keep both scrape targets).
      - targets: ['127.0.0.1:4000']
        labels:
          node: live-4000
      - targets: ['127.0.0.1:4001']
        labels:
          node: candidate-4001

  - job_name: 'minio'
    metrics_path: '/minio/health/live'
    static_configs:
      - targets: ['127.0.0.1:9000']

  - job_name: 'node'
    static_configs:
      - targets: ['127.0.0.1:9100']

  # Host-network redis_exporter (deploy-staging ensures container). Metrics:
  # redis_memory_used_bytes, redis_connected_clients, redis_commands_processed_total, ...
  - job_name: 'redis'
    static_configs:
      - targets: ['127.0.0.1:9121']
        labels:
          instance: 'redis-local'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']
