groups:
  - name: chatapp-api
    rules:
      - alert: ChatAppApiDown
        expr: sum(up{job="chatapp-api"}) < 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: ChatApp API is down
          description: >
            No ChatApp API instance has been reachable for more than 5 minutes.
            Check https://group-8.cse356.compas.cs.stonybrook.edu/health (prod)
            or http://136.114.103.71/health (staging).
            On the host: systemctl status 'chatapp@*'; journalctl -u 'chatapp@*' -n 50.

      - alert: ChatAppHigh5xxRate
        expr: |
          sum(rate(http_server_requests_total{job="chatapp-api",status_class="5xx",route!="/metrics"}[5m]))
            /
          clamp_min(sum(rate(http_server_requests_total{job="chatapp-api",route!="/metrics"}[5m])), 1)
            > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ChatApp API 5xx rate is elevated
          description: More than 5% of recent ChatApp API responses are 5xx over the last 10 minutes.

      - alert: ChatAppHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, route) (rate(http_server_request_duration_ms_bucket{job="chatapp-api",route!="/metrics"}[5m]))
          ) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ChatApp API p95 latency is high
          description: p95 request latency for route {{ $labels.route }} has exceeded 1000ms for 10 minutes.

      - alert: ChatAppEventLoopLagHigh
        expr: nodejs_eventloop_lag_p99_seconds{job="chatapp-api"} > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ChatApp event loop lag is elevated
          description: Node.js event loop p99 lag is above 250ms for at least 10 minutes.

      - alert: ChatAppHighMemoryUsage
        expr: process_resident_memory_bytes{job="chatapp-api"} > 400e6
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ChatApp API memory usage is high
          description: Node.js RSS is above 400 MB for 5 minutes. The prod VM has 2 GB total — OOM risk if this persists.
