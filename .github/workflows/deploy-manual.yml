name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      sha:
        description: "Commit SHA or ref to deploy (defaults to current ref SHA)"
        required: false
        type: string
      clear_prod_deploy_lock:
        description: "Prod only — remove /opt/chatapp/.deploy-lock-prod before deploy if a prior run left it stuck"
        required: false
        default: false
        type: boolean
      prod_canary_vm3_only:
        description: "Prod only — deploy the SHA to VM3 workers only, then stop (DEPLOY_STOP_AFTER_VM3). Soak; then run Manual Deploy prod again without this flag for full VM3→VM2→VM1 rollout."
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      resolved_sha: ${{ steps.resolve.outputs.resolved_sha }}
    steps:
      - name: Resolve target SHA
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const ref = `${{ inputs.sha || github.sha }}`.trim();
            const { data } = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
            });
            core.setOutput('resolved_sha', data.sha);
            core.info(`Resolved deploy target ${ref} -> ${data.sha}`);

  # Download the CI-built tarball from GitHub Releases so the deploy job can use
  # artifact_name (no long poll in reusable-vm-deploy). If release is not yet
  # published, build/package the artifact in this run as a fallback.
  fetch-release:
    needs: resolve-target
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout target SHA
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-target.outputs.resolved_sha }}

      - name: Ensure GitHub CLI exists
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Download release tarball
        id: download_release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.resolve-target.outputs.resolved_sha }}
        run: |
          set -euo pipefail
          ARTIFACT="chatapp-${TARGET_SHA}.tar.gz"
          echo "Waiting for release-${TARGET_SHA} from ${{ github.repository }}..."
          for attempt in $(seq 1 15); do
            if gh release download "release-${TARGET_SHA}" -R "${{ github.repository }}" -p "${ARTIFACT}" -D . 2>/dev/null; then
              echo "Downloaded on attempt ${attempt}"
              break
            fi
            if [[ "${attempt}" == "15" ]]; then
              echo "Release artifact not available after 15 attempts."
              exit 1
            fi
            echo "Attempt ${attempt}/15 failed — waiting 30s for CI to finish packaging..."
            sleep 30
          done
          test -f "${ARTIFACT}"
          ls -la "./${ARTIFACT}"

      - name: Build fallback release artifact
        if: steps.download_release.outcome != 'success' && inputs.environment != 'prod'
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies for fallback build
        if: steps.download_release.outcome != 'success' && inputs.environment != 'prod'
        run: npm ci

      - name: Build app for fallback artifact
        if: steps.download_release.outcome != 'success' && inputs.environment != 'prod'
        run: |
          npm run build --workspace=backend
          npm run build --workspace=frontend

      - name: Package fallback release artifact
        if: steps.download_release.outcome != 'success' && inputs.environment != 'prod'
        env:
          TARGET_SHA: ${{ needs.resolve-target.outputs.resolved_sha }}
        run: |
          set -euo pipefail
          mkdir -p releases
          tar --exclude=node_modules --exclude=.git --exclude=.env \
            -czf "releases/chatapp-${TARGET_SHA}.tar.gz" \
            backend/dist/ \
            backend/scripts/run-migrations.cjs \
            backend/package*.json \
            backend/tsconfig.json \
            frontend/dist/ \
            frontend/package*.json \
            migrations/ \
            package*.json \
            .env.example \
            deploy/env/prod.required.env \
            deploy/env/staging.required.env \
            deploy/apply-env-profile.py
          ls -lh "releases/chatapp-${TARGET_SHA}.tar.gz"

      - name: Fail production when release artifact is missing
        if: steps.download_release.outcome != 'success' && inputs.environment == 'prod'
        run: |
          echo "ERROR: release-${{ needs.resolve-target.outputs.resolved_sha }} artifact not found."
          echo "Production manual deploy requires the tested release artifact; fallback build is disabled."
          exit 1

      - name: Normalize artifact path
        env:
          TARGET_SHA: ${{ needs.resolve-target.outputs.resolved_sha }}
        run: |
          set -euo pipefail
          mkdir -p releases
          ARTIFACT="chatapp-${TARGET_SHA}.tar.gz"
          if [[ -f "./${ARTIFACT}" ]]; then
            cp "./${ARTIFACT}" "releases/chatapp-${TARGET_SHA}.tar.gz"
          fi
          test -f "releases/chatapp-${TARGET_SHA}.tar.gz"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.resolve-target.outputs.resolved_sha }}
          path: releases/chatapp-${{ needs.resolve-target.outputs.resolved_sha }}.tar.gz

  deploy-staging:
    needs: [resolve-target, fetch-release]
    if: inputs.environment == 'staging'
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: staging
      target_sha: ${{ needs.resolve-target.outputs.resolved_sha }}
      host: ${{ vars.STAGING_HOST || '136.114.103.71' }}
      user: ${{ vars.STAGING_USER || 'ssperrottet' }}
      script_path: deploy/deploy-staging.sh
      artifact_name: release-${{ needs.resolve-target.outputs.resolved_sha }}
      clear_prod_deploy_lock: false
      chatapp_instances: ${{ vars.CHATAPP_INSTANCES_STAGING != '' && vars.CHATAPP_INSTANCES_STAGING || '5' }}

  deploy-prod:
    needs: [resolve-target, fetch-release]
    if: inputs.environment == 'prod'
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: production
      target_sha: ${{ needs.resolve-target.outputs.resolved_sha }}
      host: ${{ vars.PROD_HOST }}
      user: ${{ vars.PROD_USER }}
      script_path: deploy/deploy-prod-multi.sh
      verify_public_host: true
      auto_confirm: true
      artifact_name: release-${{ needs.resolve-target.outputs.resolved_sha }}
      clear_prod_deploy_lock: ${{ inputs.clear_prod_deploy_lock }}
      prod_canary_vm3_only: ${{ inputs.environment == 'prod' && inputs.prod_canary_vm3_only }}
      # Prod runs five app workers by default (chatapp@4000..@4004) unless the repo/org
      # variable overrides it explicitly for a smaller recovery footprint.
      chatapp_instances: ${{ vars.CHATAPP_INSTANCES_PROD != '' && vars.CHATAPP_INSTANCES_PROD || '5' }}
