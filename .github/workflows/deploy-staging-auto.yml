name: Auto Deploy Staging

on:
  workflow_run:
    workflows:
      - CI Build & Package
    types:
      - completed

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: staging
      target_sha: ${{ github.event.workflow_run.head_sha }}
      host: ${{ vars.STAGING_HOST || '136.114.103.71' }}
      user: ${{ vars.STAGING_USER || 'ssperrottet' }}
      script_path: deploy/deploy-staging.sh
