# Nginx admission control for externally-originated traffic.
#
# Keep the keying simple and explicit:
# - external_* zones skip RFC1918/loopback callers so trusted internal load generators
#   and proxy hops are not throttled.
# - community_join_direct keys directly on the socket remote address because repeated
#   join floods are especially expensive and we do not want them accidentally exempted
#   by a broader proxy/internal-IP rule.

geo $remote_addr $is_external {
    default 1;
    10.0.0.0/8 0;
    127.0.0.1 0;
    ::1 0;
}

map $is_external $rate_limit_addr {
    1 $binary_remote_addr;
    0 "";
}

limit_req_zone $rate_limit_addr zone=external_general:10m    rate=50r/s;
limit_req_zone $rate_limit_addr zone=external_expensive:10m  rate=10r/s;
limit_req_zone $rate_limit_addr zone=external_ws:10m         rate=5r/s;
limit_req_zone $rate_limit_addr zone=external_auth:10m       rate=5r/m;
limit_req_zone $binary_remote_addr zone=community_join_direct:10m rate=5r/s;

limit_conn_zone $rate_limit_addr zone=external_conns:10m;
limit_conn_zone $rate_limit_addr zone=external_expensive_conns:10m;
