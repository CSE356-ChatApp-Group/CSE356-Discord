# Install on the app VM after PostgreSQL moves off-box:
#   sudo mkdir -p /etc/systemd/system/chatapp@.service.d
#   sudo cp deploy/systemd/chatapp-remote-db.drop-in.conf \
#     /etc/systemd/system/chatapp@.service.d/remote-db.conf
#   sudo systemctl daemon-reload
#
# Clears inherited Wants=/After= (including postgresql.service), then sets deps without local PG.

[Unit]
Wants=
After=
Wants=redis.service pgbouncer.service
After=network.target redis.service pgbouncer.service
