name: Reusable VM Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment name
        required: true
        type: string
      target_sha:
        description: Commit SHA to deploy
        required: true
        type: string
      host:
        description: Remote host
        required: true
        type: string
      user:
        description: Remote SSH user
        required: true
        type: string
      script_path:
        description: Deployment script path relative to repo root
        required: true
        type: string
      runs_on_json:
        description: JSON array for runs-on labels (e.g. ["self-hosted","deploy-prod"])
        required: false
        default: '["ubuntu-latest"]'
        type: string
      artifact_name:
        description: Current-run artifact name to deploy instead of polling GitHub Releases
        required: false
        default: ''
        type: string
      verify_public_host:
        description: Verify public HTTP endpoints after deploy
        required: false
        default: false
        type: boolean
      auto_confirm:
        description: Pipe yes into interactive deploy scripts
        required: false
        default: false
        type: boolean
      chatapp_instances:
        description: Node HTTP worker count (deploy-prod CHATAPP_INSTANCES); production currently defaults to 5 (chatapp@4000..@4004)
        required: false
        default: ''
        type: string
      clear_prod_deploy_lock:
        description: "Production only — sudo rm -rf /opt/chatapp/.deploy-lock-prod before deploy (stale lock after cancelled CI)"
        required: false
        default: false
        type: boolean
      prod_fast_rollback:
        description: "Production only — run deploy-prod-multi with --rollback (no GitHub Release wait; uses /opt/chatapp/releases/<sha> on VMs). Cannot be combined with artifact_name."
        required: false
        default: false
        type: boolean
      prod_canary_vm3_only:
        description: "Production only — set DEPLOY_STOP_AFTER_VM3=1 (deploy-prod-multi updates VM3 then exits). Requires script_path deploy/deploy-prod-multi.sh and normal release/artifact flow. Mutually exclusive with prod_fast_rollback."
        required: false
        default: false
        type: boolean
    secrets:
      DEPLOY_SSH_KEY:
        required: true
      SSH_KNOWN_HOSTS:
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: vm-deploy-${{ inputs.environment }}-${{ inputs.host }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ${{ fromJSON(inputs.runs_on_json) }}
    timeout-minutes: 45
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Deploy scripts must match the release artifact (same commit), not workflow HEAD.
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0

      - name: Ensure GitHub CLI exists
        if: ${{ inputs.artifact_name == '' && inputs.prod_fast_rollback != true }}
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Wait for release artifact
        if: ${{ inputs.artifact_name == '' && inputs.prod_fast_rollback != true }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          TAG="release-$TARGET_SHA"
          MAX_ATTEMPTS=40
          SLEEP_SECONDS=15

          echo "Waiting for release artifact: $TAG"
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
              echo "Release artifact is ready."
              exit 0
            fi
            echo "Attempt $attempt/$MAX_ATTEMPTS: release not ready yet; sleeping ${SLEEP_SECONDS}s"
            sleep "$SLEEP_SECONDS"
          done

          echo "ERROR: release artifact $TAG not available after waiting."
          exit 1

      - name: Download current-run artifact
        if: ${{ inputs.artifact_name != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifacts

      - name: Resolve local artifact path
        id: artifact
        if: ${{ inputs.artifact_name != '' }}
        shell: bash
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          EXPECTED="chatapp-${TARGET_SHA}.tar.gz"
          FILE=$(find .artifacts -type f -name "$EXPECTED")
          COUNT=$(printf '%s\n' "$FILE" | sed '/^$/d' | wc -l | tr -d ' ')
          test "$COUNT" = "1" || { echo "Expected exactly one $EXPECTED artifact, found $COUNT"; exit 1; }
          echo "local_path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Validate deploy inputs
        shell: bash
        run: |
          test -n "${{ inputs.host }}" || { echo "Missing deployment host"; exit 1; }
          test -n "${{ inputs.user }}" || { echo "Missing deployment user"; exit 1; }
          if [[ "${{ inputs.prod_fast_rollback }}" == "true" ]]; then
            if [[ "${{ inputs.environment }}" != "production" ]]; then
              echo "ERROR: prod_fast_rollback is only valid for environment production."
              exit 1
            fi
            if [[ -n "${{ inputs.artifact_name }}" ]]; then
              echo "ERROR: prod_fast_rollback cannot be combined with artifact_name (no tarball needed)."
              exit 1
            fi
          fi
          if [[ "${{ inputs.prod_fast_rollback }}" == "true" ]] && [[ "${{ inputs.prod_canary_vm3_only }}" == "true" ]]; then
            echo "ERROR: prod_fast_rollback and prod_canary_vm3_only cannot be used together."
            exit 1
          fi
          if [[ "${{ inputs.prod_canary_vm3_only }}" == "true" ]]; then
            if [[ "${{ inputs.environment }}" != "production" ]]; then
              echo "ERROR: prod_canary_vm3_only is only valid for environment production."
              exit 1
            fi
            if [[ "${{ inputs.script_path }}" != "deploy/deploy-prod-multi.sh" ]]; then
              echo "ERROR: prod_canary_vm3_only requires script_path deploy/deploy-prod-multi.sh"
              exit 1
            fi
          fi

      - name: Setup SSH key
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY" || { echo "Missing DEPLOY_SSH_KEY secret"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Multiplex all SSH connections over one TCP session to avoid
          # triggering fail2ban with rapid successive connections.
          touch ~/.ssh/config
          chmod 600 ~/.ssh/config
          printf 'Host *\n  ControlMaster auto\n  ControlPath ~/.ssh/ctl-%%h-%%p-%%r\n  ControlPersist 5m\n' >> ~/.ssh/config

      - name: Add host to known_hosts
        shell: bash
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          touch ~/.ssh/known_hosts
          if [[ -n "$SSH_KNOWN_HOSTS" ]]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            for attempt in 1 2 3; do
              ssh-keyscan -T 15 -H "${{ inputs.host }}" >> ~/.ssh/known_hosts && break
              echo "keyscan attempt ${attempt}/3 failed; retrying in 5s"
              sleep 5
            done
            test -s ~/.ssh/known_hosts || { echo "Failed to populate known_hosts"; exit 1; }
            # For prod multi-VM deployments, also add the DB host to known_hosts
            if [[ "${{ inputs.environment }}" == "production" ]]; then
              DB_HOST="${{ vars.PROD_DB_HOST || '130.245.136.21' }}"
              for attempt in 1 2 3; do
                ssh-keyscan -T 15 -H "$DB_HOST" >> ~/.ssh/known_hosts && break
                echo "DB host keyscan attempt ${attempt}/3 failed; retrying in 5s"
                sleep 5
              done
            fi
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Runner and SSH preflight diagnostics
        shell: bash
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOY_SCRIPT_PATH: ${{ inputs.script_path }}
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_USER: ${{ inputs.user }}
          RUNS_ON_JSON: ${{ inputs.runs_on_json }}
          RUNNER_NAME_CTX: ${{ runner.name }}
          RUNNER_OS_CTX: ${{ runner.os }}
          RUNNER_ARCH_CTX: ${{ runner.arch }}
        run: |
          set -euo pipefail
          echo "Runner diagnostics:"
          echo "  runs_on_json=${RUNS_ON_JSON}"
          echo "  runner.name=${RUNNER_NAME_CTX}"
          echo "  runner.os=${RUNNER_OS_CTX}"
          echo "  runner.arch=${RUNNER_ARCH_CTX}"
          echo "  deploy_env=${DEPLOY_ENV}"
          echo "  deploy_script=${DEPLOY_SCRIPT_PATH}"
          echo "  deploy_target=${DEPLOY_USER}@${DEPLOY_HOST}"
          ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "echo target-ok && hostname"
          if [[ "${DEPLOY_ENV}" == "production" && "${DEPLOY_SCRIPT_PATH}" == "deploy/deploy-prod-multi.sh" ]]; then
            echo "Multi-VM production deploy detected; checking SSH reachability to all app VMs..."
            for vm in 130.245.136.44 130.245.136.137 130.245.136.54; do
              ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new \
                "${DEPLOY_USER}@${vm}" "echo vm-ok:${vm} && hostname"
            done
          fi

      # Rollback deploys check out an old SHA whose prod-nginx-audit.sh may still
      # fail on benign nginx/worker drift. Always audit using origin/main's script.
      - name: Resolve prod nginx audit script from main
        if: ${{ inputs.environment == 'production' && inputs.prod_fast_rollback != true }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .nginx-audit
          git fetch origin main
          git show "origin/main:scripts/ops/prod-nginx-audit.sh" > .nginx-audit/prod-nginx-audit.sh
          chmod +x .nginx-audit/prod-nginx-audit.sh

      - name: Audit prod nginx parity before deploy
        if: ${{ inputs.environment == 'production' && inputs.prod_fast_rollback != true }}
        shell: bash
        env:
          PROD_HOST: ${{ inputs.host }}
          PROD_USER: ${{ inputs.user }}
        run: ./.nginx-audit/prod-nginx-audit.sh

      # Rollback jobs checkout an old SHA; do not rely on that tree's Ansible for this.
      - name: Clear stale prod deploy lock on VM
        if: ${{ inputs.environment == 'production' && inputs.clear_prod_deploy_lock }}
        shell: bash
        env:
          PROD_HOST: ${{ inputs.host }}
          PROD_USER: ${{ inputs.user }}
          DEPLOY_SCRIPT_PATH: ${{ inputs.script_path }}
        run: |
          set -euo pipefail
          # Match deploy-prod-multi.sh: accept-new so VM2/VM3 work when SSH_KNOWN_HOSTS
          # only lists the primary ingress host (otherwise this step fails in ~1s).
          if [[ "${DEPLOY_SCRIPT_PATH}" == "deploy/deploy-prod-multi.sh" ]]; then
            for vm in 130.245.136.44 130.245.136.137 130.245.136.54; do
              ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new \
                "${PROD_USER}@${vm}" \
                'sudo rm -rf /opt/chatapp/.deploy-lock-prod'
            done
          else
            ssh -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new \
              "${PROD_USER}@${PROD_HOST}" \
              'sudo rm -rf /opt/chatapp/.deploy-lock-prod'
          fi

      - name: Deploy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.target_sha }}
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_USER: ${{ inputs.user }}
          LOCAL_ARTIFACT_PATH: ${{ steps.artifact.outputs.local_path }}
          CHATAPP_INSTANCES_INPUT: ${{ inputs.chatapp_instances }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_ENV: ${{ inputs.environment }}
          DEPLOY_SCRIPT_PATH: ${{ inputs.script_path }}
          PROD_FAST_ROLLBACK: ${{ inputs.prod_fast_rollback }}
          PROD_CANARY_VM3_ONLY: ${{ inputs.prod_canary_vm3_only }}
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_SCRIPT_PATH:-}" ]]; then
            echo "Missing deploy script path"
            exit 1
          fi
          if [[ "${DEPLOY_SCRIPT_PATH}" = /* ]]; then
            SCRIPT="${DEPLOY_SCRIPT_PATH}"
          else
            SCRIPT="${GITHUB_WORKSPACE}/${DEPLOY_SCRIPT_PATH}"
          fi
          test -f "${SCRIPT}" || { echo "Deploy script not found: ${SCRIPT}"; exit 1; }

          if [[ "$DEPLOY_ENV" == "production" ]]; then
            export PROD_HOST="${DEPLOY_HOST}"
            export PROD_USER="${DEPLOY_USER}"
          elif [[ "$DEPLOY_ENV" == "staging" ]]; then
            export STAGING_HOST="${DEPLOY_HOST}"
            export STAGING_USER="${DEPLOY_USER}"
          else
            echo "Unknown environment: $DEPLOY_ENV"
            exit 1
          fi

          export GITHUB_REPO="${GITHUB_REPOSITORY}"
          export DEPLOY_NON_INTERACTIVE=true

          if [[ -n "${CHATAPP_INSTANCES_INPUT:-}" ]]; then
            export CHATAPP_INSTANCES="${CHATAPP_INSTANCES_INPUT}"
          fi

          if [[ "${PROD_FAST_ROLLBACK:-false}" == "true" ]]; then
            unset LOCAL_ARTIFACT_PATH || true
            export SKIP_DB_SSH_PREFLIGHT=1
            echo "prod_fast_rollback: skipping tarball; running ${SCRIPT} ${TARGET_SHA} --rollback"
            bash "${SCRIPT}" "${TARGET_SHA}" --rollback
          else
            if [[ -n "${LOCAL_ARTIFACT_PATH:-}" ]]; then
              LP="${LOCAL_ARTIFACT_PATH}"
              [[ "${LP}" != /* ]] && LP="${GITHUB_WORKSPACE}/${LP}"
              export LOCAL_ARTIFACT_PATH="${LP}"
            fi

            if [[ "${PROD_CANARY_VM3_ONLY:-false}" == "true" ]]; then
              export DEPLOY_STOP_AFTER_VM3=1
              echo "prod_canary_vm3_only: DEPLOY_STOP_AFTER_VM3=1 (rollout pauses after VM3)"
            fi

            bash "${SCRIPT}" "${TARGET_SHA}"
          fi

      - name: Audit prod nginx parity after deploy
        if: ${{ always() && inputs.environment == 'production' }}
        shell: bash
        env:
          PROD_HOST: ${{ inputs.host }}
          PROD_USER: ${{ inputs.user }}
        run: ./.nginx-audit/prod-nginx-audit.sh

      - name: Verify public endpoints
        if: ${{ inputs.verify_public_host }}
        shell: bash
        run: |
          curl -fsS --max-time 10 "http://${{ inputs.host }}/health" >/dev/null
          curl -fsS --max-time 10 "http://${{ inputs.host }}/" >/dev/null
          echo "Public endpoint checks passed for ${{ inputs.host }}"
