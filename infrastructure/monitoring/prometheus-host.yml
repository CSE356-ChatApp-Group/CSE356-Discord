global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: chatapp-__ALERT_ENVIRONMENT__
    environment: __ALERT_ENVIRONMENT__

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'chatapp-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['127.0.0.1:4000']
        labels:
          node: live-4000
      - targets: ['127.0.0.1:4001']
        labels:
          node: candidate-4001

  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']
