# Production VM1: install to /etc/nginx/conf.d/admission-control.conf
# (used with sites-available/chatapp zones: external_general, external_conns, …).
#
# COMPAS / internal grading traffic often arrives from RFC1918 (e.g. 10.0.1.x).
# For those clients, $rate_limit_addr is the empty string. Per nginx docs
# (ngx_http_limit_conn_module / ngx_http_limit_req_module), requests with an
# empty zone key are NOT counted — so edge limit_req / limit_conn here do not
# throttle internal LBs; limits apply to external IPs only ($binary_remote_addr).
#
# Staging uses deploy/nginx/admission-control.conf (different zone names); do not mix.

geo $remote_addr $is_external {
    default 1;
    10.0.0.0/8 0;
    172.16.0.0/12 0;
    192.168.0.0/16 0;
    100.64.0.0/10 0;
    127.0.0.1 0;
    ::1 0;
}

map $is_external $rate_limit_addr {
    1 $binary_remote_addr;
    0 "";
}

limit_req_zone $rate_limit_addr zone=external_general:10m    rate=5000r/s;
limit_req_zone $rate_limit_addr zone=external_expensive:10m  rate=1000r/s;
limit_req_zone $rate_limit_addr zone=external_join:10m       rate=500r/s;
limit_req_zone $binary_remote_addr zone=community_join_direct:10m rate=500r/s;
limit_req_zone $rate_limit_addr zone=external_ws:10m         rate=500r/s;
limit_req_zone $rate_limit_addr zone=external_auth:10m       rate=500r/m;

limit_conn_zone $rate_limit_addr zone=external_conns:10m;
limit_conn_zone $rate_limit_addr zone=external_expensive_conns:10m;
