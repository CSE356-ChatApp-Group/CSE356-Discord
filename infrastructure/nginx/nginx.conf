# =============================================================================
# Nginx – reverse proxy for ChatApp
#
# Handles:
#   • HTTP → HTTPS redirect
#   • REST API proxying (/api/*)
#   • WebSocket upgrade (/ws)
#   • Static frontend assets (if serving from Nginx)
#
# For multi-node cloud deployment, replace the upstream api block with the
# IP addresses / DNS names of your API instances and enable load balancing.
# Optional: put a CDN (CloudFront, Fastly, etc.) in front of this host for static /assets
# and edge caching; keep /api and /ws on origin or use cache-safe GET policies only.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    # Match deploy-prod.sh / prod-vm-setup default (4096 is too low for WS bursts; see nginx error.log).
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time urt=$upstream_response_time rid=$request_id';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    include /etc/nginx/conf.d/*.conf;

    limit_req_status 429;
    large_client_header_buffers 4 16k;

    # ── Upstream: API nodes ───────────────────────────────────────────────────
    # In cloud deployment, add Node 3 and Node 4 API IPs here:
    #   server 10.0.1.3:3000;
    #   server 10.0.1.4:3000;
    upstream api_nodes {
        least_conn;
        server api:3000;
        keepalive 32;
    }

    upstream minio_nodes {
        least_conn;
        server minio:9000;
        keepalive 16;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Known abusive / malicious clients (Apr 2026); not grader infrastructure.
        deny 47.20.119.33;
        deny 45.55.213.87;
        deny 129.49.101.12;
        deny 130.245.67.34;

        if ($http_host = "") {
            return 403;
        }

        # Clients that pass baseUrl ending with /api/v1 then call /api/v1/... (duplicate prefix).
        location ~ ^/api/v1(/api/v1)+(.*)$ {
            rewrite ^ /api/v1$2 last;
        }

        # In production, redirect HTTP → HTTPS:
        # return 301 https://$host$request_uri;

        # For local dev, serve directly:

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws {
            limit_req zone=ws_upgrade_sec burst=4 nodelay;
            limit_req zone=ws_upgrade_min burst=10 nodelay;
            limit_conn ws_conn_per_ip 3;
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # keep WS alive
            proxy_send_timeout 86400s;
        }

        # Search: long upstream reads (aligns with deploy/nginx/staging.conf).
        location ^~ /api/v1/search {
            limit_req zone=http_ip_strict burst=40 nodelay;
            limit_req zone=http_slash24 burst=400 nodelay;
            limit_conn http_api_conn_per_ip 48;
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
            client_max_body_size 10m;
        }

        # Critical OAuth/auth flow routes: bypass the generic nginx auth throttles so
        # start/callback redirects do not fail before the app sees them.
        location ^~ /api/v1/auth/course/callback {
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
            client_max_body_size 10m;
        }

        location ^~ /api/v1/auth/course {
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
            client_max_body_size 10m;
        }

        location ^~ /api/v1/auth/oauth/complete-create {
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
            client_max_body_size 10m;
        }

        location ^~ /api/v1/auth/login {
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
            client_max_body_size 10m;
        }

        location ^~ /api/v1/auth/register {
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_504 non_idempotent;
            proxy_next_upstream_tries 2;
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
            client_max_body_size 10m;
        }

        # ── Auth endpoints ────────────────────────────────────────────────────
        # bcrypt-bound; allow upstream longer than generic /api (30s) so nginx
        # returns fewer 504 HTML pages while the app sheds load (429) or finishes.
        location /api/v1/auth/ {
            limit_req zone=http_ip_strict burst=40 nodelay;
            limit_req zone=http_slash24 burst=400 nodelay;
            limit_conn http_api_conn_per_ip 48;
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 75s;
            proxy_send_timeout 75s;
        }

        # Avoid nginx 301 /api/v1/communities → …/communities/ (breaks POST in browsers).
        location = /api/v1/communities {
            limit_req zone=http_ip_strict burst=40 nodelay;
            limit_req zone=http_slash24 burst=400 nodelay;
            limit_conn http_api_conn_per_ip 48;
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 10m;
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=http_ip_strict burst=40 nodelay;
            limit_req zone=http_slash24 burst=400 nodelay;
            limit_conn http_api_conn_per_ip 48;
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Request-Id $request_id;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 10m;
        }

        location = /minio {
            return 307 /minio/;
        }

        location /minio/ {
            proxy_pass              http://minio_nodes/;
            proxy_http_version      1.1;
            # Must match Host used when presigning (backend s3Presign → 127.0.0.1:9000); see storage.ts.
            proxy_set_header        Host 127.0.0.1:9000;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      300s;
            client_max_body_size    10m;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://api_nodes;
            access_log off;
        }

        # ── SPA (same layout as deploy/nginx/staging.conf; dist mounted by docker-compose) ──
        location /assets/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store";
        }

        location / {
            root /usr/share/nginx/html;
            try_files $uri /index.html;
        }
    }

    # ── TLS server (uncomment and configure for production) ───────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... (same location blocks as above)
    # }
}
