name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      sha:
        description: "Commit SHA to deploy (defaults to current ref SHA)"
        required: false
        type: string

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # Download the CI-built tarball from GitHub Releases so the deploy job can use
  # artifact_name (no long poll in reusable-vm-deploy).
  fetch-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TARGET_SHA="${{ inputs.sha || github.sha }}"
          echo "Downloading release-${TARGET_SHA} from ${{ github.repository }}"
          gh release download "release-${TARGET_SHA}" -R "${{ github.repository }}" -p '*.tar.gz' -D .
          ls -la ./*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ inputs.sha || github.sha }}
          path: '*.tar.gz'

  deploy-staging:
    needs: fetch-release
    if: inputs.environment == 'staging'
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: staging
      target_sha: ${{ inputs.sha || github.sha }}
      host: ${{ vars.STAGING_HOST || '136.114.103.71' }}
      user: ${{ vars.STAGING_USER || 'ssperrottet' }}
      script_path: deploy/deploy-staging.sh
      artifact_name: release-${{ inputs.sha || github.sha }}

  deploy-prod:
    needs: fetch-release
    if: inputs.environment == 'prod'
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: production
      target_sha: ${{ inputs.sha || github.sha }}
      host: ${{ vars.PROD_HOST }}
      user: ${{ vars.PROD_USER }}
      script_path: deploy/deploy-prod.sh
      verify_public_host: true
      auto_confirm: true
      artifact_name: release-${{ inputs.sha || github.sha }}
      # Dual workers on prod (chatapp@4000 + @4001): nginx must list both; deploy-prod runs 9b/9c when >=2.
      chatapp_instances: ${{ vars.CHATAPP_INSTANCES_PROD != '' && vars.CHATAPP_INSTANCES_PROD || '2' }}
