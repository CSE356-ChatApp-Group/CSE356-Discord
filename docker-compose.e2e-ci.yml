# Minimal stack for PR smoke E2E (Playwright @smoke).
# Usage: docker compose -f docker-compose.e2e-ci.yml up -d --wait
# Then: API on localhost:3000, MinIO on localhost:9000; run Vite on host with
# API_PROXY_TARGET=http://127.0.0.1:3000 and WS_PROXY_TARGET=ws://127.0.0.1:3000

networks:
  e2e:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: chatapp_e2e_ci
    networks: [e2e]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chatapp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_e2e_ci --appendonly yes
    networks: [e2e]
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_e2e_ci', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
    networks: [e2e]

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      sh -c "
        sleep 3;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/chatapp-attachments;
        mc anonymous set download local/chatapp-attachments;
        exit 0"
    networks: [e2e]
    restart: 'no'

  migrate:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm ci && npm run migrate"
    volumes:
      - ./backend:/app
      - ./migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://chatapp:chatapp_e2e_ci@postgres:5432/chatapp
    depends_on:
      postgres:
        condition: service_healthy
    networks: [e2e]
    restart: 'no'

  api:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm ci && npm run build && exec node dist/index.js"
    volumes:
      - ./backend:/app
      - ./migrations:/migrations:ro
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://chatapp:chatapp_e2e_ci@postgres:5432/chatapp
      REDIS_URL: redis://:redis_e2e_ci@redis:6379
      JWT_ACCESS_SECRET: e2e_ci_access_secret_change_me
      JWT_REFRESH_SECRET: e2e_ci_refresh_secret_change_me
      FRONTEND_URL: http://127.0.0.1:5173
      CORS_ORIGIN: http://127.0.0.1:5173
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_BUCKET: chatapp-attachments
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks: [e2e]
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
