name: Manual Staging E2E

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: staging-e2e-nightly
  cancel-in-progress: false

jobs:
  e2e-staging-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: ${{ vars.STAGING_E2E_BASE_URL || format('http://{0}', vars.STAGING_HOST || '136.114.103.71') }}
      E2E_SKIP_WEBSERVER: "1"
      CI: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run staging E2E against deployed staging
        run: npm run e2e:staging:ci --workspace=frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-staging-nightly-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7
