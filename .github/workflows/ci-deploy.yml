name: CI Build & Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Validate deploy scripts
        run: |
          bash -n deploy/preflight-check.sh
          bash -n deploy/deploy-staging.sh
          bash -n deploy/deploy-prod.sh

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backend typecheck
        run: npm run typecheck --workspace=backend

      - name: Backend tests
        run: npm run test --workspace=backend

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: backend/dist
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck --workspace=frontend

      - name: Frontend tests
        run: npm run test --workspace=frontend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 7

  package-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - deploy-scripts
      - backend
      - frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: backend/dist

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist

      - name: Package release artifact
        run: |
          mkdir -p releases
          tar --exclude=node_modules --exclude=.git --exclude=.env \
            -czf releases/chatapp-${{ github.sha }}.tar.gz \
            backend/dist/ \
            backend/package*.json \
            backend/tsconfig.json \
            frontend/dist/ \
            frontend/package*.json \
            migrations/ \
            package*.json \
            .env.example
          echo "Packaged: releases/chatapp-${{ github.sha }}.tar.gz"
          ls -lh releases/chatapp-${{ github.sha }}.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: releases/chatapp-*.tar.gz
          retention-days: 30

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="release-${{ github.sha }}"
          FILE="releases/chatapp-${{ github.sha }}.tar.gz"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$FILE" --clobber
          else
            gh release create "$TAG" "$FILE" \
              --notes "Deploy to staging or production using:\n\n./deploy/deploy-staging.sh ${{ github.sha }}\n./deploy/deploy-prod.sh ${{ github.sha }}"
          fi

  deploy-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - package-release
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: staging
      target_sha: ${{ github.sha }}
      host: ${{ vars.STAGING_HOST || '136.114.103.71' }}
      user: ${{ vars.STAGING_USER || 'ssperrottet' }}
      script_path: deploy/deploy-staging.sh
      artifact_name: release-${{ github.sha }}
