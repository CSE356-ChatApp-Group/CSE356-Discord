name: PR smoke E2E

# Full-stack @smoke Playwright against API + Postgres + Redis + MinIO in Docker.
# Complements unit/integration on PR (see ci-deploy.yml).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  smoke-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - name: Start stack (API + DB + Redis + MinIO)
        run: docker compose -f docker-compose.e2e-ci.yml up -d --wait

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Vite (host) and smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_SKIP_WEBSERVER: '1'
          CI: 'true'
          API_PROXY_TARGET: http://127.0.0.1:3000
          WS_PROXY_TARGET: ws://127.0.0.1:3000
        run: |
          set -euo pipefail
          cd frontend
          npm run dev -- --host 127.0.0.1 --port 5173 &
          VITE_PID=$!
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:5173/ >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 $VITE_PID 2>/dev/null; then
              echo "Vite exited early"
              exit 1
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:5173/ >/dev/null
          npm run e2e:pr-smoke
          kill $VITE_PID || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pr-playwright-report-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7

      - name: Tear down Docker
        if: always()
        run: docker compose -f docker-compose.e2e-ci.yml down -v
