# Used only when ANSIBLE_CONFIG points here (see reusable-vm-deploy.yml).
# Adds timing callbacks without requiring every laptop to install ansible.posix.
[defaults]
inventory = inventory
roles_path = roles
host_key_checking = True
retry_files_enabled = False
interpreter_python = auto_silent
callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer

[inventory]
enable_plugins = host_list, script, auto, yaml, ini
