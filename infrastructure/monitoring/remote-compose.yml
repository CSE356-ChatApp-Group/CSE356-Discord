# App VM only: metrics collection (node-exporter) and log shipping (promtail).
# The full monitoring stack (Grafana, Prometheus, Alertmanager, Loki, Tempo)
# runs on the monitoring VM (130.245.136.120) via monitoring-compose.yml.
services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)
      - --collector.textfile.directory=/var/lib/node_exporter/textfile_collector
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      # Synthetic probe metrics from scripts/ops/synthetic-probe.sh (TEXTFILE_DIR on host).
      - ./node_exporter_textfile:/var/lib/node_exporter/textfile_collector:ro

  promtail:
    image: grafana/promtail:3.1.0
    restart: unless-stopped
    network_mode: host
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - /var/log:/var/log:ro
      - /opt/chatapp/shared/logs:/opt/chatapp/shared/logs:ro
      - ./promtail-host-config.yml:/etc/promtail/config.yml:ro
