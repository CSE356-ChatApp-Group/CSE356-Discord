name: CI Build & Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-scripts:
    runs-on: [self-hosted, Linux, X64, "${{ vars.RUNNER_LABEL_CI != '' && vars.RUNNER_LABEL_CI || 'gcp' }}"]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Validate deploy scripts
        run: |
          bash -n deploy/preflight-check.sh
          bash -n deploy/deploy-staging.sh
          bash -n deploy/deploy-prod.sh
          bash -n scripts/prod-observe.sh
          bash -n scripts/prod-nginx-audit.sh
          bash -n scripts/prod-observe-loop.sh
          bash -n scripts/prod-log-correlate.sh
          bash -n scripts/prod-capacity-snapshot.sh
          bash -n deploy/cutover-to-remote-db.sh
          bash -n deploy/tune-remote-db-postgres.sh
          bash -n deploy/postgres-migrate-data-volume.sh
          bash -n deploy/install-db-metrics-exporters.sh
          node --check deploy/candidate-ws-smoke.cjs
          bash -n scripts/synthetic-probe.sh
          bash -n scripts/metrics-snapshot.sh
          bash -n scripts/self-hosted-actions-runner-disk-cleanup.sh
          bash -n scripts/recommended-release-verify.sh
          bash -n scripts/measure-fanout-baseline.sh
          python3 -m py_compile deploy/ensure-pgdump-env.py
          python3 -m py_compile deploy/apply-env-profile.py
          python3 -m py_compile deploy/prometheus-db-file-sd.py
          node --check backend/scripts/api-contract-harness.cjs

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm --entrypoint promtool \
            -v "$GITHUB_WORKSPACE/infrastructure/monitoring:/rules:ro" \
            prom/prometheus:v2.53.1 \
            check rules /rules/alerts.yml

      - name: Validate Grafana dashboards
        run: node scripts/validate-grafana-dashboards.mjs

      - name: Validate Ansible playbooks (syntax)
        run: |
          if ! command -v ansible-playbook >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y ansible-core
          fi
          cd ansible
          ansible-playbook --syntax-check \
            playbooks/ping.yml \
            playbooks/bootstrap-staging.yml \
            playbooks/bootstrap-prod.yml \
            playbooks/deploy-staging.yml \
            playbooks/deploy-prod.yml

  backend:
    needs:
      - deploy-scripts
    runs-on: [self-hosted, Linux, X64, "${{ vars.RUNNER_LABEL_CI != '' && vars.RUNNER_LABEL_CI || 'gcp' }}"]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Backend typecheck
        run: npm run typecheck --workspace=backend

      - name: Backend tests
        run: |
          set -o pipefail
          npm run test --workspace=backend -- --runInBand --verbose 2>&1 | tee backend-test.log

      - name: Backend failure summary
        if: failure()
        run: |
          echo "---- Extracted Jest failure summary ----"
          grep -E '^(FAIL|  ●|  ✕|Test Suites:|Tests:)' backend-test.log || true

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Upload backend dist
        uses: actions/upload-artifact@v7
        with:
          name: backend-dist-${{ github.sha }}
          path: backend/dist
          retention-days: 7

  frontend:
    needs:
      - backend
    runs-on: [self-hosted, Linux, X64, "${{ vars.RUNNER_LABEL_CI != '' && vars.RUNNER_LABEL_CI || 'gcp' }}"]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck --workspace=frontend

      - name: Frontend tests
        run: npm run test --workspace=frontend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist
          retention-days: 7

  package-release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - deploy-scripts
      - backend
      - frontend
    runs-on: [self-hosted, Linux, X64, "${{ vars.RUNNER_LABEL_CI != '' && vars.RUNNER_LABEL_CI || 'gcp' }}"]
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Ensure GitHub CLI exists
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Download backend dist
        uses: actions/download-artifact@v8
        with:
          name: backend-dist-${{ github.sha }}
          path: backend/dist

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist

      - name: Package release artifact
        run: |
          mkdir -p releases
          tar --exclude=node_modules --exclude=.git --exclude=.env \
            -czf releases/chatapp-${{ github.sha }}.tar.gz \
            backend/dist/ \
            backend/scripts/run-migrations.cjs \
            backend/package*.json \
            backend/tsconfig.json \
            frontend/dist/ \
            frontend/package*.json \
            migrations/ \
            package*.json \
            .env.example
          echo "Packaged: releases/chatapp-${{ github.sha }}.tar.gz"
          ls -lh releases/chatapp-${{ github.sha }}.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.sha }}
          path: releases/chatapp-*.tar.gz
          retention-days: 30

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="release-${{ github.sha }}"
          FILE="releases/chatapp-${{ github.sha }}.tar.gz"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$FILE" --clobber
          else
            gh release create "$TAG" "$FILE" \
              --notes "Deploy to staging or production using:\n\n./deploy/deploy-staging.sh ${{ github.sha }}\n./deploy/deploy-prod.sh ${{ github.sha }}"
          fi

  deploy-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - package-release
    uses: ./.github/workflows/reusable-vm-deploy.yml
    secrets: inherit
    with:
      environment: staging
      target_sha: ${{ github.sha }}
      host: ${{ vars.STAGING_HOST || '136.114.103.71' }}
      user: ${{ vars.STAGING_USER || 'ssperrottet' }}
      script_path: deploy/deploy-staging.sh
      artifact_name: release-${{ github.sha }}

  e2e-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - deploy-staging
    runs-on: [self-hosted, Linux, X64, "${{ vars.RUNNER_LABEL_CI != '' && vars.RUNNER_LABEL_CI || 'gcp' }}"]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      # One shard at a time on shared self-hosted runners avoids Chromium OOM / disk pressure.
      max-parallel: 1
      matrix:
        shard_index: [1, 2]
    env:
      E2E_BASE_URL: ${{ format('http://{0}', vars.STAGING_HOST || '136.114.103.71') }}
      E2E_GLOBAL_TIMEOUT_MS: '2100000'
      E2E_TOTAL_SHARDS: '2'
      CI: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run staging e2e shard
        run: |
          npm --prefix frontend run build
          npx playwright test \
            --config frontend/playwright.config.ts \
            --grep @staging \
            --workers=1 \
            --retries=2 \
            --reporter=list \
            --shard=${{ matrix.shard_index }}/${{ env.E2E_TOTAL_SHARDS }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}-shard-${{ matrix.shard_index }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

  api-contract-staging:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - deploy-staging
    runs-on: [self-hosted, Linux, X64, "${{ vars.RUNNER_LABEL_CI != '' && vars.RUNNER_LABEL_CI || 'gcp' }}"]
    timeout-minutes: 15
    env:
      API_CONTRACT_BASE_URL: ${{ format('http://{0}/api/v1', vars.STAGING_HOST || '136.114.103.71') }}
      API_CONTRACT_WS_URL: ${{ format('ws://{0}/ws', vars.STAGING_HOST || '136.114.103.71') }}
      API_CONTRACT_SSO_SKIP: ${{ vars.API_CONTRACT_SSO_SKIP }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run api-contract
