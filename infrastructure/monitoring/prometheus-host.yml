# Prometheus on the **database / monitoring** host scrapes the **app** VM over the VPC.
# Placeholders are expanded by deploy/render-prometheus-host-config.py during deploy
# (see deploy-prod.sh and deploy-staging.sh).
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: chatapp-__ALERT_ENVIRONMENT__
    environment: __ALERT_ENVIRONMENT__

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'chatapp-api'
    metrics_path: '/metrics'
    static_configs:
__CHATAPP_API_STATIC_CONFIGS__
  # MinIO is intentionally not scraped here: on prod/staging the app VM binds the S3 API
  # to 127.0.0.1 only, so a Prometheus on the DB VM cannot dial :9000. Check MinIO with
  # `curl -sS http://127.0.0.1:9000/minio/health/live` on the app host.

  # App VM host metrics (node_exporter in remote-compose on the app VM).
  - job_name: 'node'
    static_configs:
      - targets: ['__PROM_APP_HOST__:9100']

  # Dedicated DB VM — targets from file_sd (see deploy/prometheus-db-file-sd.py).
  # Empty [] when Postgres is local or PGDUMP_DATABASE_URL is unset. Install exporters:
  #   DB_SSH=root@<db-host> ./deploy/install-db-metrics-exporters.sh
  - job_name: 'db-node'
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/db-node.json
        refresh_interval: 30s

  - job_name: 'db-postgres'
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/db-postgres.json
        refresh_interval: 30s

  # Host-network redis_exporter on the app VM (deploy ensures container).
  - job_name: 'redis'
    static_configs:
      - targets: ['__PROM_APP_HOST__:9121']
        labels:
          instance: 'redis-local'

  # PgBouncer metrics exporter on the app VM (deploy ensures python script running).
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['__PROM_APP_HOST__:9126']
        labels:
          instance: 'pgbouncer-local'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']
