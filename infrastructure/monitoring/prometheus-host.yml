# Prometheus on the **monitoring VM** scrapes all prod VMs over the VPC.
# Placeholders are expanded by deploy/render-prometheus-host-config.py during deploy
# (see deploy-prod.sh / deploy-prod-multi.sh).
#
# Single-VM placeholders (backward-compatible):
#   primary app host marker        — private IP of the primary app VM (VM1)
#   api static config marker       — one chatapp-api scrape target per HTTP worker
#
# Multi-VM placeholders (set when --vm2-host / --vm3-host are passed):
#   node exporter marker           — node_exporter targets for all app VMs
#   pgbouncer marker               — pgbouncer-exporter targets for all app VMs
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: chatapp-__ALERT_ENVIRONMENT__
    environment: __ALERT_ENVIRONMENT__

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'chatapp-api'
    metrics_path: '/metrics'
    # Each worker target carries:
    #   vm          — vm1 / vm2 / vm3
    #   worker_port — 4000..4005
    #   node        — legacy worker-role label kept for compatibility
    static_configs:
__CHATAPP_API_STATIC_CONFIGS__
  # MinIO is intentionally not scraped here: on prod/staging the app VM binds the S3 API
  # to 127.0.0.1 only, so a Prometheus on the DB VM cannot dial :9000. Check MinIO with
  # `curl -sS http://127.0.0.1:9000/minio/health/live` on the app host.

  # App VM host metrics (node_exporter via remote-compose on each app VM).
  # In multi-VM mode, node-exporter targets expand to all three VMs with a vm label.
  # In single-VM mode, this resolves to one target on the primary app VM.
  - job_name: 'node'
    static_configs:
__NODE_EXPORTER_TARGETS__

  # Dedicated DB VM — targets from file_sd (see deploy/prometheus-db-file-sd.py).
  # Empty [] when Postgres is local or PGDUMP_DATABASE_URL is unset. Install exporters:
  #   DB_SSH=root@<db-host> ./deploy/install-db-metrics-exporters.sh
  - job_name: 'db-node'
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/db-node.json
        refresh_interval: 30s

  - job_name: 'db-postgres'
    scrape_interval: 15s
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/db-postgres.json
        refresh_interval: 30s

  # Redis metrics via redis_exporter on the Redis VM.
  - job_name: 'redis'
    static_configs:
      - targets: ['__PROM_REDIS_HOST__:9121']
        labels:
          instance: 'redis-primary'

  # PgBouncer metrics exporter on each app VM (:9126). Each VM runs an independent
  # PgBouncer in multi-VM mode, and the marker expands to all targets.
  - job_name: 'pgbouncer'
    static_configs:
__PGBOUNCER_TARGETS__
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['127.0.0.1:9090']
