name: Reusable VM Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: Deployment environment name
        required: true
        type: string
      target_sha:
        description: Commit SHA to deploy
        required: true
        type: string
      host:
        description: Remote host
        required: true
        type: string
      user:
        description: Remote SSH user
        required: true
        type: string
      script_path:
        description: "Deprecated — ignored. Deploy uses Ansible (playbooks/deploy-staging.yml or deploy-prod.yml). Kept for workflow_call compatibility."
        required: true
        type: string
      artifact_name:
        description: Current-run artifact name to deploy instead of polling GitHub Releases
        required: false
        default: ''
        type: string
      verify_public_host:
        description: Verify public HTTP endpoints after deploy
        required: false
        default: false
        type: boolean
      auto_confirm:
        description: Pipe yes into interactive deploy scripts
        required: false
        default: false
        type: boolean
      chatapp_instances:
        description: Node HTTP worker count (deploy-prod CHATAPP_INSTANCES); production currently defaults to 4 (chatapp@4000..@4003)
        required: false
        default: ''
        type: string
    secrets:
      DEPLOY_SSH_KEY:
        required: true
      SSH_KNOWN_HOSTS:
        required: false

permissions:
  contents: read
  actions: read

concurrency:
  group: vm-deploy-${{ inputs.environment }}-${{ inputs.host }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, "${{ vars.RUNNER_LABEL_DEPLOY != '' && vars.RUNNER_LABEL_DEPLOY || 'deploy-prod' }}"]
    timeout-minutes: 25
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Deploy scripts must match the release artifact (same commit), not workflow HEAD.
          ref: ${{ inputs.target_sha }}
          fetch-depth: 0

      - name: Ensure GitHub CLI exists
        if: ${{ inputs.artifact_name == '' }}
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

      - name: Wait for release artifact
        if: ${{ inputs.artifact_name == '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          TAG="release-$TARGET_SHA"
          MAX_ATTEMPTS=40
          SLEEP_SECONDS=15

          echo "Waiting for release artifact: $TAG"
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
              echo "Release artifact is ready."
              exit 0
            fi
            echo "Attempt $attempt/$MAX_ATTEMPTS: release not ready yet; sleeping ${SLEEP_SECONDS}s"
            sleep "$SLEEP_SECONDS"
          done

          echo "ERROR: release artifact $TAG not available after waiting."
          exit 1

      - name: Download current-run artifact
        if: ${{ inputs.artifact_name != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: .artifacts

      - name: Resolve local artifact path
        id: artifact
        if: ${{ inputs.artifact_name != '' }}
        shell: bash
        env:
          TARGET_SHA: ${{ inputs.target_sha }}
        run: |
          set -euo pipefail
          EXPECTED="chatapp-${TARGET_SHA}.tar.gz"
          FILE=$(find .artifacts -type f -name "$EXPECTED")
          COUNT=$(printf '%s\n' "$FILE" | sed '/^$/d' | wc -l | tr -d ' ')
          test "$COUNT" = "1" || { echo "Expected exactly one $EXPECTED artifact, found $COUNT"; exit 1; }
          echo "local_path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Validate deploy inputs
        shell: bash
        run: |
          test -n "${{ inputs.host }}" || { echo "Missing deployment host"; exit 1; }
          test -n "${{ inputs.user }}" || { echo "Missing deployment user"; exit 1; }

      - name: Setup SSH key
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_SSH_KEY" || { echo "Missing DEPLOY_SSH_KEY secret"; exit 1; }
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Multiplex all SSH connections over one TCP session to avoid
          # triggering fail2ban with rapid successive connections.
          touch ~/.ssh/config
          chmod 600 ~/.ssh/config
          printf 'Host *\n  ControlMaster auto\n  ControlPath ~/.ssh/ctl-%%h-%%p-%%r\n  ControlPersist 5m\n' >> ~/.ssh/config

      - name: Add host to known_hosts
        shell: bash
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          touch ~/.ssh/known_hosts
          if [[ -n "$SSH_KNOWN_HOSTS" ]]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            for attempt in 1 2 3; do
              ssh-keyscan -T 15 -H "${{ inputs.host }}" >> ~/.ssh/known_hosts && break
              echo "keyscan attempt ${attempt}/3 failed; retrying in 5s"
              sleep 5
            done
            test -s ~/.ssh/known_hosts || { echo "Failed to populate known_hosts"; exit 1; }
          fi
          chmod 600 ~/.ssh/known_hosts

      # Rollback deploys check out an old SHA whose prod-nginx-audit.sh may still
      # fail on benign nginx/worker drift. Always audit using origin/main's script.
      - name: Resolve prod nginx audit script from main
        if: ${{ inputs.environment == 'production' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .nginx-audit
          git fetch origin main
          git show "origin/main:scripts/prod-nginx-audit.sh" > .nginx-audit/prod-nginx-audit.sh
          chmod +x .nginx-audit/prod-nginx-audit.sh

      - name: Audit prod nginx parity before deploy
        if: ${{ inputs.environment == 'production' }}
        shell: bash
        env:
          PROD_HOST: ${{ inputs.host }}
          PROD_USER: ${{ inputs.user }}
        run: ./.nginx-audit/prod-nginx-audit.sh

      - name: Deploy via Ansible
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ inputs.target_sha }}
          DEPLOY_HOST: ${{ inputs.host }}
          DEPLOY_USER: ${{ inputs.user }}
          LOCAL_ARTIFACT_PATH: ${{ steps.artifact.outputs.local_path }}
          CHATAPP_INSTANCES_INPUT: ${{ inputs.chatapp_instances }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          if ! command -v ansible-playbook >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y ansible-core
          fi

          INV="${RUNNER_TEMP}/vm-deploy-inventory.ini"
          if [[ "$DEPLOY_ENV" == "staging" ]]; then
            printf '%s\n' '[staging]' \
              "staging-vm ansible_host=${DEPLOY_HOST} ansible_user=${DEPLOY_USER} github_repo=${GITHUB_REPOSITORY}" > "$INV"
            PLAYBOOK="ansible/playbooks/deploy-staging.yml"
          elif [[ "$DEPLOY_ENV" == "production" ]]; then
            printf '%s\n' '[production]' \
              "prod-app ansible_host=${DEPLOY_HOST} ansible_user=${DEPLOY_USER} github_repo=${GITHUB_REPOSITORY}" > "$INV"
            PLAYBOOK="ansible/playbooks/deploy-prod.yml"
          else
            echo "Unknown environment: $DEPLOY_ENV (expected staging or production)"
            exit 1
          fi

          EXTRA_ARGS=(-e "deploy_sha=${TARGET_SHA}")
          if [[ -n "${LOCAL_ARTIFACT_PATH:-}" ]]; then
            LP="${LOCAL_ARTIFACT_PATH}"
            if [[ "${LP}" != /* ]]; then
              LP="${GITHUB_WORKSPACE}/${LP}"
            fi
            EXTRA_ARGS+=(-e "local_artifact_path=${LP}")
          fi
          if [[ "$DEPLOY_ENV" == "production" ]] && [[ -n "${CHATAPP_INSTANCES_INPUT:-}" ]]; then
            EXTRA_ARGS+=(-e "chatapp_instances=${CHATAPP_INSTANCES_INPUT}")
          fi

          cd "${GITHUB_WORKSPACE}"

          if [[ "${{ inputs.auto_confirm }}" == "true" ]] && [[ "$DEPLOY_ENV" == "production" ]]; then
            printf 'y\n' | ansible-playbook -i "$INV" "$PLAYBOOK" "${EXTRA_ARGS[@]}"
          else
            ansible-playbook -i "$INV" "$PLAYBOOK" "${EXTRA_ARGS[@]}"
          fi

      - name: Audit prod nginx parity after deploy
        if: ${{ always() && inputs.environment == 'production' }}
        shell: bash
        env:
          PROD_HOST: ${{ inputs.host }}
          PROD_USER: ${{ inputs.user }}
        run: ./.nginx-audit/prod-nginx-audit.sh

      - name: Verify public endpoints
        if: ${{ inputs.verify_public_host }}
        shell: bash
        run: |
          curl -fsS --max-time 10 "http://${{ inputs.host }}/health" >/dev/null
          curl -fsS --max-time 10 "http://${{ inputs.host }}/" >/dev/null
          echo "Public endpoint checks passed for ${{ inputs.host }}"
