# DB VM: no Docker monitoring services run here.
#
# PostgreSQL metrics are collected by systemd-managed node_exporter (:9100) and
# postgres_exporter (:9187), installed by deploy/install-db-metrics-exporters.sh.
# Prometheus on the monitoring VM scrapes them via file_sd targets generated by
# deploy/prometheus-db-file-sd.py (see infrastructure/monitoring/file_sd/).
#
# The full observability stack (Grafana, Prometheus, Alertmanager, Loki, Tempo)
# runs on the monitoring VM (130.245.136.120) via monitoring-compose.yml.

services: {}
