# deploy/nginx/staging.conf
#
# Nginx site config for the staging environment.  Deployed by deploy-staging.sh,
# which replaces the __LIVE_PORT__ placeholder with the active backend port at
# deploy time.
#
# This file is the single source of truth for nginx configuration.  Edit here;
# never edit the live file on the server directly (it will be overwritten on
# the next deploy).

upstream chatapp_upstream {
  least_conn;
  server 127.0.0.1:__LIVE_PORT__ max_fails=0;
  keepalive 256;
  keepalive_requests 10000;
  keepalive_timeout 75s;
}

server {
  listen 80 default_server backlog=4096;
  listen [::]:80 default_server backlog=4096;
  server_name _;

  limit_req_status 429;
  large_client_header_buffers 4 16k;

  # Abusive registration flood (Apr 2026, single residential IP); not the grader.
  deny 47.20.119.33;
  # Heavy external traffic flood (Apr 2026); blocked on prod app hosts.
  deny 130.245.192.3;

  if ($http_host = "") {
    return 403;
  }

  # Harness may use `${origin}/api/v1` as baseUrl then append `/api/v1/...`.
  # Internal redirect so ^~ /api/v1/* locations still match after normalization.
  location ~ ^/api/v1(/api/v1)+(.*)$ {
    rewrite ^ /api/v1$2 last;
  }

  location /ws {
    limit_req zone=ws_upgrade_sec burst=4 nodelay;
    limit_req zone=ws_upgrade_min burst=10 nodelay;
    limit_conn ws_conn_per_ip 3;
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 0;
  }

  # Search: allow pool + DB tail without nginx closing a successful upstream response.
  location ^~ /api/v1/search {
    limit_req zone=http_ip_strict burst=40 nodelay;
    limit_req zone=http_slash24 burst=400 nodelay;
    limit_conn http_api_conn_per_ip 48;
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
    client_max_body_size 10m;
  }

  # Critical OAuth/auth flow routes: bypass the generic nginx auth throttles so
  # start/callback redirects do not fail before the app sees them.
  location ^~ /api/v1/auth/course/callback {
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
    client_max_body_size 10m;
  }

  location ^~ /api/v1/auth/course {
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
    client_max_body_size 10m;
  }

  location ^~ /api/v1/auth/oauth/complete-create {
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
    client_max_body_size 10m;
  }

  location ^~ /api/v1/auth/login {
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
    client_max_body_size 10m;
  }

  location ^~ /api/v1/auth/register {
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
    client_max_body_size 10m;
  }

  # Auth: bcrypt + DB; longer read timeout than generic /api (30s). Dedicated
  # location so /api/v1/auth/* does not inherit the short search-unrelated cap.
  location ^~ /api/v1/auth/ {
    limit_req zone=http_ip_strict burst=40 nodelay;
    limit_req zone=http_slash24 burst=400 nodelay;
    limit_conn http_api_conn_per_ip 48;
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
    client_max_body_size 10m;
  }

  location ~ ^/api/v1/communities/[^/]+/join/?$ {
    limit_req zone=community_join_direct burst=60 nodelay;
    limit_req zone=http_ip_strict burst=40 nodelay;
    limit_req zone=http_slash24 burst=400 nodelay;
    limit_conn http_api_conn_per_ip 48;
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 30s;
    client_max_body_size 10m;
  }

  # Exact URI only: prefix `location /api/` triggers nginx's trailing-slash redirect for
  # `/api/v1/communities` → `/api/v1/communities/`. Browsers replay 301 POST as GET without
  # body, so create sees 200 + { communities } and the UI throws "missing id".
  location = /api/v1/communities {
    limit_req zone=http_ip_strict burst=40 nodelay;
    limit_req zone=http_slash24 burst=400 nodelay;
    limit_conn http_api_conn_per_ip 48;
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 30s;
    client_max_body_size 10m;
  }

  location /api/ {
    limit_req zone=http_ip_strict burst=40 nodelay;
    limit_req zone=http_slash24 burst=400 nodelay;
    limit_conn http_api_conn_per_ip 48;
    proxy_pass http://chatapp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout http_502 http_503 http_504 non_idempotent;
    proxy_next_upstream_tries 0;
    proxy_read_timeout 30s;
    client_max_body_size 10m;
  }

  # /health: cheap per-request but DB/Redis ops accumulate under sustained hammering.
  # Rate-limit external IPs; internal 10.x uses empty key and is never counted.
  location /health {
    limit_req zone=http_ip_strict burst=5 nodelay;
    limit_conn http_api_conn_per_ip 4;
    proxy_pass http://chatapp_upstream/health;
    access_log off;
  }

  # MinIO object storage proxy.
  # The Host header MUST match the hostname used when signing presigned URLs:
  # the S3 client signs with INTERNAL_ENDPOINT (127.0.0.1:9000), so nginx
  # must forward exactly that value or MinIO will reject the signature.
  location /minio/ {
    limit_req zone=http_ip_strict burst=20 nodelay;
    limit_conn http_api_conn_per_ip 8;
    proxy_pass http://127.0.0.1:9000/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:9000;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 10m;
  }

  location = /grafana {
    return 301 /grafana/;
  }

  location /grafana/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /grafana;
    proxy_redirect http://127.0.0.1:3001/ /;
    proxy_redirect http://localhost/ /;
    proxy_redirect ~^/(.*)$ /$1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
  }

  location / {
    root /opt/chatapp/current/frontend/dist;
    try_files $uri /index.html;
  }

  location = /index.html {
    root /opt/chatapp/current/frontend/dist;
    add_header Cache-Control "no-store";
  }

  location /assets/ {
    root /opt/chatapp/current/frontend/dist;
    try_files $uri =404;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }
}
