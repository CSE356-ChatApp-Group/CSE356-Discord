groups:
  - name: chatapp-api
    rules:
      - alert: ChatAppApiDown
        expr: sum(up{job="chatapp-api"}) < 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: ChatApp API is down
          description: >
            No ChatApp API instance has been reachable for more than 5 minutes.
            Check https://group-8.cse356.compas.cs.stonybrook.edu/health (prod)
            or http://136.114.103.71/health (staging).
            On the host: systemctl status 'chatapp@*'; journalctl -u 'chatapp@*' -n 50.

      - alert: ChatAppHigh5xxRate
        expr: |
          sum(rate(http_server_requests_total{job="chatapp-api",status_class="5xx",route!="/metrics"}[5m]))
            /
          clamp_min(sum(rate(http_server_requests_total{job="chatapp-api",route!="/metrics"}[5m])), 1)
            > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ChatApp API 5xx rate is elevated
          description: More than 5% of recent ChatApp API responses are 5xx over the last 10 minutes.

      - alert: ChatAppHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, route) (rate(http_server_request_duration_ms_bucket{job="chatapp-api",route!="/metrics"}[5m]))
          ) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ChatApp API p95 latency is high
          description: p95 request latency for route {{ $labels.route }} has exceeded 1000ms for 10 minutes.

      # Fast-burn signal: short-window failures can hurt grading even before 10m alerts fire.
      - alert: ChatAppFast5xxBurn
        expr: |
          sum(rate(http_server_requests_total{job="chatapp-api",status_class="5xx",route!="/metrics"}[2m]))
            /
          clamp_min(sum(rate(http_server_requests_total{job="chatapp-api",route!="/metrics"}[2m])), 1)
            > 0.08
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: ChatApp API fast 5xx burn detected
          description: >
            5xx ratio exceeded 8% over a 2-minute window. This catches burst failures quickly
            (before longer warning windows) and should trigger immediate scaling or load shedding action.

      - alert: ChatAppEventLoopLagHigh
        expr: nodejs_eventloop_lag_p99_seconds{job="chatapp-api"} > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: ChatApp event loop lag is elevated
          description: Node.js event loop p99 lag is above 250ms for at least 10 minutes.

      - alert: ChatAppHighMemoryUsage
        expr: process_resident_memory_bytes{job="chatapp-api"} > 400e6
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ChatApp API memory usage is high
          description: Node.js RSS is above 400 MB for 5 minutes. The prod VM has 2 GB total — OOM risk if this persists.

      - alert: ChatAppCpuSaturationHigh
        expr: max by (instance) (rate(process_cpu_seconds_total{job="chatapp-api"}[5m])) > 0.80
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: ChatApp API CPU saturation is high
          description: API instance {{ $labels.instance }} has used more than 80% of one CPU core for 15 minutes. On production this is a practical scale-up signal.

      # Pool queue depth (Node → PgBouncer). Sustained waits mean you are near DB/app
      # throughput limits — scale vertically, split DB, or reduce per-request DB work.
      - alert: ChatAppPgPoolPressure
        expr: max(pg_pool_waiting{job="chatapp-api"}) > 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Postgres connection pool queue is building (capacity warning)
          description: >
            More than 15 concurrent requests are waiting for a pg pool slot (10m avg).
            **Capacity signal:** add vCPU/RAM, enlarge PgBouncer/Postgres limits, or split app/DB.
            Check Grafana/pg_pool_waiting and PG logs for slow queries.

      - alert: ChatAppPgPoolSevereSaturation
        expr: max(pg_pool_waiting{job="chatapp-api"}) > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Postgres pool severely saturated — expect 503s and timeouts
          description: >
            Over 100 waiters for 5m. The app is past comfortable capacity; clients likely see
            circuit-open 503s, connect timeouts, or status 0. **Act:** scale DB tier or reduce load.

      - alert: ChatAppPgPoolMostlyCheckedOut
        expr: |
          max by (instance) (
            (pg_pool_total{job="chatapp-api"} - pg_pool_idle{job="chatapp-api"})
            / clamp_min(pg_pool_total{job="chatapp-api"}, 1)
          ) > 0.92
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Nearly all Postgres pool connections are in use
          description: >
            >92% of pool slots are busy for 10m. You are at effective connection capacity even
            if the wait queue is still small — scale or tune pool/PgBouncer before waiters spike.

      - alert: ChatAppOverloadSheddingActive
        expr: max(chatapp_overload_stage{job="chatapp-api"}) >= 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ChatApp overload shedding is active
          description: The overload guard has reached stage {{ $value }}, which means search or write protection is engaged. This is a strong signal that the current server size is under pressure.

      - alert: ChatAppMinioDown
        expr: sum(up{job="minio",environment="production"}) < 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Production MinIO attachment store is unavailable
          description: Prometheus cannot reach production MinIO on /minio/health/live. Attachment uploads and downloads may fail until it recovers.

      - alert: ChatAppHostCpuHigh
        expr: 100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{job="node",mode="idle"}[5m]))) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Host CPU usage is high
          description: Host {{ $labels.instance }} has been above 85% CPU for 15 minutes. If latency is rising too, this is a good time to scale up prod.

      - alert: ChatAppHostLoadPerCoreHigh
        expr: (node_load5{job="node"} / clamp_min(machine_cpu_cores{job="node"}, 1)) > 1.6
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host run queue pressure is high per CPU core
          description: >
            5-minute load average per core is above 1.6 for 10m on {{ $labels.instance }}.
            CPU demand is consistently above scheduling capacity; burst latency will degrade.

      - alert: ChatAppHostIoWaitHigh
        expr: 100 * avg by (instance) (rate(node_cpu_seconds_total{job="node",mode="iowait"}[5m])) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host I/O wait is high
          description: >
            CPU iowait is above 20% for 10m on {{ $labels.instance }}. The node is stalling on disk/network I/O,
            which often amplifies tail latency under burst traffic.

      - alert: ChatAppHostMemoryPressure
        expr: (node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"}) < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host memory pressure is high
          description: Less than 15% of system memory is available on {{ $labels.instance }} for 10 minutes. Prod is close to needing a larger VM.

      # Swap I/O: sustained page swap in/out usually means RAM pressure beyond "low MemAvailable"
      # — latency spikes and grading timeouts often follow. Requires node_exporter node_vmstat_*.
      - alert: ChatAppHostSwapIoHigh
        expr: |
          (
            rate(node_vmstat_pswpin{job="node"}[5m])
            + rate(node_vmstat_pswpout{job="node"}[5m])
          ) > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host swap I/O is elevated
          description: >
            Combined swap in+out rate is above 200 pages/sec for 10m on {{ $labels.instance }}.
            The VM is likely thrashing — add RAM, reduce colocated workloads, or investigate memory leaks.
            Tune the threshold for your page size and workload if noisy.

      - alert: ChatAppDiskSpaceLow
        expr: |
          (
            node_filesystem_avail_bytes{job="node",mountpoint="/",fstype!~"tmpfs|overlay"}
              /
            node_filesystem_size_bytes{job="node",mountpoint="/",fstype!~"tmpfs|overlay"}
          ) < 0.15
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Host disk space is running low
          description: Less than 15% disk space remains on the root filesystem for 30 minutes.

  # HTTP behaviour under stress — complements raw 5xx% (timeouts often abort before 5xx).
  - name: chatapp-capacity-edge
    rules:
      - alert: ChatAppHighHttpAbortRate
        expr: |
          (
            sum(rate(http_server_requests_aborted_total{job="chatapp-api"}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_total{job="chatapp-api",route!="/metrics"}[5m])), 0.001)
          ) > 0.08
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Many HTTP responses abort before completion (timeout / client disconnect)
          description: >
            Aborted requests exceed 8% of completed traffic for 10m — often correlates with
            overload, upstream slowness, or clients giving up. **Capacity / stability signal.**

      - alert: ChatAppHttpOverloadShedding
        expr: sum(rate(http_overload_shed_total{job="chatapp-api"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Event-loop lag HTTP shedding is firing (503 early rejects)
          description: >
            OVERLOAD_HTTP_SHED is rejecting traffic. The Node tier is under CPU/event-loop pressure;
            scale app vCPU or reduce work per request.

      - alert: ChatAppCriticalFanoutQueueBacklog
        expr: max(side_effect_queue_depth{job="chatapp-api",queue="fanout:critical"}) > 3000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Critical fanout queue backlog is growing
          description: >
            The `fanout:critical` async queue has over 3000 pending jobs for 10m.
            Real-time delivery is lagging behind ingress; increase fanout concurrency, reduce fanout work,
            or scale API workers before user-visible staleness spikes.

      - alert: ChatAppCriticalFanoutQueueDelayHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, queue) (rate(side_effect_queue_delay_ms_bucket{job="chatapp-api",queue="fanout:critical"}[5m]))
          ) > 1500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Critical fanout queue wait time is high
          description: >
            p95 queue delay for `fanout:critical` exceeds 1.5s for 10m. This is an early warning that
            burst traffic is outpacing side-effect processing and WS/event freshness is degrading.

      - alert: ChatAppDeliveryFailsWarning
        expr: |
          (
            sum(rate(http_server_requests_total{job="chatapp-api",route=~"/api/v1/messages.*",status_class="5xx"}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_total{job="chatapp-api",route=~"/api/v1/messages.*"}[5m])), 1)
          ) > 0.03
          or sum(rate(side_effect_job_duration_ms_count{job="chatapp-api",queue="fanout:critical",status="error"}[5m])) > 1
          or sum(rate(side_effect_queue_dropped_total{job="chatapp-api",queue=~"fanout:critical|fanout:background"}[5m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Delivery failures are elevated
          description: >
            Message-route 5xx rate, critical fanout job errors, or dropped side-effect jobs are sustained.
            Delivery may be delayed or failing for users. Investigate API saturation, Redis fanout health,
            and side-effect queue pressure.

      - alert: ChatAppDeliveryFailsFastBurn
        expr: |
          (
            sum(rate(http_server_requests_total{job="chatapp-api",route=~"/api/v1/messages.*",status_class="5xx"}[2m]))
            /
            clamp_min(sum(rate(http_server_requests_total{job="chatapp-api",route=~"/api/v1/messages.*"}[2m])), 1)
          ) > 0.08
          or sum(rate(side_effect_job_duration_ms_count{job="chatapp-api",queue="fanout:critical",status="error"}[2m])) > 5
          or sum(rate(side_effect_queue_dropped_total{job="chatapp-api",queue="fanout:critical"}[2m])) > 0.2
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Fast-burn delivery failures detected
          description: >
            Rapid degradation in delivery path: message-route 5xx burn, fanout critical job failures,
            or dropped critical side-effect jobs in a short window. This should page immediately.

  # Redis (requires redis_exporter job on :9121 — deploy-staging installs it).
  - name: chatapp-redis
    rules:
      - alert: ChatAppRedisExporterDown
        expr: up{job="redis"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: redis_exporter scrape failing (Redis may still be running)
          description: >
            Prometheus cannot reach :9121. Fix the `redis` scrape target or the exporter container.
            (No alert if the `redis` job is not configured — add it when you run redis_exporter.)

      - alert: ChatAppRedisMemoryNearMax
        expr: |
          redis_memory_max_bytes{job="redis"} > 0
          and
          (redis_memory_used_bytes{job="redis"} / redis_memory_max_bytes{job="redis"}) > 0.88
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Redis is close to maxmemory eviction threshold
          description: >
            Used memory is >88% of configured maxmemory. Eviction or OOM risk — raise maxmemory,
            add RAM, or reduce cache TTL / key volume.

      # Absolute threshold — tune for your `maxclients` / workload (exporter label sets vary by version).
      - alert: ChatAppRedisClientsElevated
        expr: redis_connected_clients{job="redis"} > 300
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Redis has many concurrent clients
          description: >
            >300 connected clients for 15m. If approaching `maxclients`, new connections may fail;
            check for pool leaks or raise limits.
