# VM installs to /etc/nginx/conf.d/admission-control.conf (staging-vm-setup, prod-vm-setup, deploy-staging).
# Rate-limit zones — must appear inside http { } (included from conf.d).
#
# $skip_strict_edge_rl=1 skips HTTP rate + conn limits for:
#   • RFC1918 (10/8, 172.16/12, 192.168/16) — internal LBs and GCP internal IPs on 10.x are unaffected.
#   • Loopback, CGNAT (100.64/10)
#
# 136.114.0.0/16 (Stony Brook public space) is NOT exempted here — abuse has been observed from that
# range.  Grader traffic is tolerated by normal limits: auth/OAuth routes bypass nginx rate limiting
# entirely (see staging.conf ^~ /api/v1/auth/login|register|course|oauth blocks), and the generic
# /api/ limit (20r/s per IP) is sufficient for functional grading patterns.

geo $remote_addr $skip_strict_edge_rl {
  default 0;
  127.0.0.1 1;
  ::1 1;
  10.0.0.0/8 1;
  172.16.0.0/12 1;
  192.168.0.0/16 1;
  100.64.0.0/10 1;
}

map $skip_strict_edge_rl $http_strict_rl_key {
  0 $binary_remote_addr;
  1 "";
}

map $remote_addr $http_slash24_raw {
  default $binary_remote_addr;
  ~^(\d+)\.(\d+)\.(\d+)\.(\d+)$ $1.$2.$3.0/24;
}

map $skip_strict_edge_rl $http_slash24_rl_key {
  0 $http_slash24_raw;
  1 "";
}

map $skip_strict_edge_rl $community_join_rl_key {
  0 $binary_remote_addr;
  1 "";
}

limit_req_zone $http_strict_rl_key zone=http_ip_strict:10m rate=20r/s;
limit_req_zone $http_slash24_rl_key zone=http_slash24:10m rate=400r/s;
limit_req_zone $http_strict_rl_key zone=ws_upgrade_sec:10m rate=2r/s;
limit_req_zone $http_strict_rl_key zone=ws_upgrade_min:10m rate=10r/m;
limit_conn_zone $http_strict_rl_key zone=ws_conn_per_ip:10m;
limit_conn_zone $http_strict_rl_key zone=http_api_conn_per_ip:10m;

limit_req_zone $community_join_rl_key zone=community_join_direct:10m rate=5r/s;
