# =============================================================================
# ChatApp MVP – docker-compose.yml
#
# Local development: runs all services on one machine.
# Cloud deployment: split across 4 nodes (see docs/deployment.md).
#
# Services map to cloud nodes:
#   Node 1 (db):        postgres, redis
#   Node 2 (proxy):     nginx, api (primary)
#   Node 3 (search):    api (replica), meilisearch
#   Node 4 (monitor):   api (replica), prometheus, grafana
# =============================================================================

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  chatapp:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  pg_data:
  redis_data:
  meili_data:
  minio_data:
  prometheus_data:
  grafana_data:

services:
  # ── Node 1 · Database ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatapp
      POSTGRES_USER: chatapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatapp_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [chatapp]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev}
      --appendonly yes
    volumes:
      - redis_data:/data
    networks: [chatapp]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 10s

  # ── Node 2 · API (primary) ────────────────────────────────────────────────────
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./backend:/app
      - ./migrations:/migrations
      - /app/node_modules
    restart: unless-stopped
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      AUTH_BYPASS: ${AUTH_BYPASS:-false}
      PORT: 3000
      DATABASE_URL: postgres://chatapp:${POSTGRES_PASSWORD:-chatapp_dev}@postgres:5432/chatapp
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY:-meili_dev}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      # S3 / MinIO
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-chatapp-attachments}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # OAuth (optional – configure in .env)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [chatapp]
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3000"
      - "prometheus.path=/metrics"

  # Run migrations as a one-shot container before the API starts
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run migrate
    volumes:
      - ./migrations:/migrations:ro
    environment:
      DATABASE_URL: postgres://chatapp:${POSTGRES_PASSWORD:-chatapp_dev}@postgres:5432/chatapp
    depends_on:
      postgres: { condition: service_healthy }
    networks: [chatapp]
    restart: "no"

  # ── Node 2 · Reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on: [api]
    networks: [chatapp]

  # ── Node 3 · Search ───────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.9
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-meili_dev}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks: [chatapp]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s

  # ── S3-compatible object storage (MinIO) ──────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001" # Web console (dev only)
    networks: [chatapp]

  # Create the S3 bucket on first boot
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/${S3_BUCKET:-chatapp-attachments};
        mc anonymous set download local/${S3_BUCKET:-chatapp-attachments};
        exit 0"
    networks: [chatapp]
    restart: "no"

  # ── Frontend dev server (local only – in production, build and serve via Nginx)
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "/api/v1"
      VITE_WS_BASE: "/ws"
      API_PROXY_TARGET: "http://nginx"
      WS_PROXY_TARGET: "ws://nginx"
    networks: [chatapp]
    depends_on: [api]

  # ── Node 4 · Monitoring ───────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.1
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [chatapp]

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks: [chatapp]
