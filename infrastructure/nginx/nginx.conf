# =============================================================================
# Nginx – reverse proxy for ChatApp
#
# Handles:
#   • HTTP → HTTPS redirect
#   • REST API proxying (/api/*)
#   • WebSocket upgrade (/ws)
#   • Static frontend assets (if serving from Nginx)
#
# For multi-node cloud deployment, replace the upstream api block with the
# IP addresses / DNS names of your API instances and enable load balancing.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream: API nodes ───────────────────────────────────────────────────
    # In cloud deployment, add Node 3 and Node 4 API IPs here:
    #   server 10.0.1.3:3000;
    #   server 10.0.1.4:3000;
    upstream api_nodes {
        least_conn;
        server api:3000;
        keepalive 32;
    }

    upstream minio_nodes {
        least_conn;
        server minio:9000;
        keepalive 16;
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # In production, redirect HTTP → HTTPS:
        # return 301 https://$host$request_uri;

        # For local dev, serve directly:

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws {
            proxy_pass         http://api_nodes;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;  # keep WS alive
            proxy_send_timeout 86400s;
        }

        # ── Auth endpoints ────────────────────────────────────────────────────
        location /api/v1/auth/ {
            proxy_pass         http://api_nodes;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_nodes;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            client_max_body_size 10m;
        }

        location = /minio {
            return 307 /minio/;
        }

        location /minio/ {
            proxy_pass              http://minio_nodes/;
            proxy_http_version      1.1;
            proxy_set_header        Host minio:9000;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      300s;
            client_max_body_size    10m;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://api_nodes;
            access_log off;
        }

        # ── Frontend static (uncomment if serving from Nginx) ─────────────────
        # location / {
        #     root /usr/share/nginx/html;
        #     try_files $uri /index.html;
        #     expires 1h;
        # }
    }

    # ── TLS server (uncomment and configure for production) ───────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... (same location blocks as above)
    # }
}
